<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoWBoT Stats</title>
    <link rel="icon" type="image/png" sizes="32x32" href="images/stats_emoji_32px.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/stats_emoji_16px.png">
    <link rel="apple-touch-icon" sizes="180x180" href="images/stats_emoji_180px.png">

    <!-- Open Graph / Social Preview -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://bitcoinubuntu.github.io/powbot-stats/">
    <meta property="og:title" content="PoWBoT Stats">
    <meta property="og:description" content="Real-time activity stats for PoW rewards to merchants and projects across Africa.">
    <meta property="og:image" content="https://bitcoinubuntu.github.io/powbot-stats/images/PoWBoT_preview.jpg">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://bitcoinubuntu.github.io/powbot-stats/">
    <meta name="twitter:title" content="PoWBoT Stats">
    <meta name="twitter:description" content="Real-time activity stats for PoW rewards to merchants and projects across Africa.">
    <meta name="twitter:image" content="https://bitcoinubuntu.github.io/powbot-stats/images/PoWBoT_preview.jpg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #21262d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-orange: #f7931a;
            --accent-green: #3fb950;
            --accent-blue: #58a6ff;
            --accent-purple: #a371f7;
            --border: #30363d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding: 20px;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--accent-orange);
            margin-bottom: 8px;
        }

        header .tagline {
            color: var(--text-secondary);
            font-style: normal;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;               /* space between mascot and title */
            flex-wrap: wrap;         /* safe for very small screens */
        }

        .header-text {
            text-align: left;
        }

        .mascot-icon {
            height: 111px;           /* increased from 86px */
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(247, 147, 26, 0.3));  /* subtle orange glow */
            transition: transform 0.25s ease;
        }

        .mascot-icon:hover {
            transform: scale(1.08);  /* gentle friendly pop on hover */
        }

        @media (max-width: 500px) {
            .mascot-icon {
                height: 83px;        /* scales down nicely on phones */
            }
            .header-content {
                gap: 12px;
            }
            .header-text {
                text-align: center;
            }
        }

        .quick-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .quick-link-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
        }

        .quick-link-btn:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
            background: var(--bg-secondary);
        }

        .quick-link-icon {
            font-size: 2rem;
            line-height: 1;
        }

        .quick-link-text {
            flex: 1;
            text-align: left;
        }

        .quick-link-title {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 2px;
        }

        .quick-link-subtitle {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .launch-banner {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(16, 185, 129, 0.05));
            border: 2px solid var(--accent-green);
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 20px;
            text-align: center;
        }

        .launch-banner h2 {
            font-size: 1.3rem;
            color: var(--accent-green);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .launch-banner p {
            color: var(--text-secondary);
            margin-bottom: 0;
        }

        .today-banner {
            background: linear-gradient(135deg, rgba(247, 147, 26, 0.15), rgba(247, 147, 26, 0.05));
            border: 1px solid var(--accent-orange);
            border-radius: 12px;
            padding: 16px 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .today-banner .today-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--accent-orange);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .today-banner .today-time {
            text-transform: none;
            font-weight: 400;
            color: var(--text-secondary);
        }

        .today-banner .today-stats {
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .today-banner .today-stat {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }

        .today-banner .today-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .today-banner .today-unit {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .today-banner .today-value.merchant { color: var(--accent-green); }
        .today-banner .today-value.project { color: var(--accent-blue); }

        .week-banner {
            background: linear-gradient(135deg, rgba(163, 113, 247, 0.15), rgba(163, 113, 247, 0.05));
            border: 1px solid var(--accent-purple);
            border-radius: 12px;
            padding: 16px 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .week-banner .week-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--accent-purple);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .week-banner .week-stats {
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .week-banner .week-stat {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }

        .week-banner .week-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .week-banner .week-unit {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        @media (max-width: 600px) {
            .week-banner {
                flex-direction: column;
                align-items: flex-start;
            }
            .week-banner .week-stats {
                gap: 16px;
            }
        }

        @media (max-width: 600px) {
            .today-banner {
                flex-direction: column;
                align-items: flex-start;
            }
            .today-banner .today-stats {
                gap: 16px;
            }
        }

        .countries-banner-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .countries-banner-list {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px;
            margin: 0;
        }

        @media (max-width: 1100px) {
            .countries-banner-content {
                flex-direction: column;
                align-items: center;
            }
            .countries-banner-list {
                justify-content: center;
            }
        }

        .card.top-performers {
            background: linear-gradient(135deg, rgba(163, 113, 247, 0.15), rgba(163, 113, 247, 0.05));
            border-color: var(--accent-purple);
            display: flex;
            flex-direction: column;
        }

        .card.top-performers h2 {
            color: var(--accent-purple);
        }

        .top-performers-list {
            display: flex;
            flex-direction: column;
            margin-top: auto;
        }

        .top-performer-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.2s;
            cursor: pointer;
        }

        .top-performer-item:last-child {
            border-bottom: none;
        }

        /* Mobile-safe hover - no layout shifts */
        a.top-performer-item:hover {
            background: rgba(163, 113, 247, 0.1);
            border-radius: 8px;
        }

        a.top-performer-item:hover .top-performer-name {
            color: var(--accent-purple);
        }

        /* Desktop-only polished hover - layout shifts allowed */
        @media (hover: hover) and (pointer: fine) {
            a.top-performer-item:hover {
                margin: 0 -8px;
                padding: 8px 8px;
                transform: translateX(4px);
            }
        }

        .top-performer-rank {
            font-size: 1rem;
            width: 24px;
            flex-shrink: 0;
        }

        .top-performer-name {
            flex: 1;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .top-performer-count {
            font-weight: 600;
            color: var(--accent-purple);
        }

        .top-performer-label {
            color: var(--text-secondary);
            margin-left: 4px;
        }

        .no-performers {
            color: var(--text-secondary);
            font-style: italic;
            margin-top: auto;
            padding: 8px 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (min-width: 900px) {
            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 600px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            overflow: hidden;
            max-width: 100%;
        }

        .card h2 {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        .epoch-overview-card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .epoch-overview-stats {
            margin-top: auto;
        }

        .big-number, .burn-status {
            font-size: 2.5rem;
            font-weight: 700;
        }

        .big-number {
            color: var(--accent-orange);
        }

        .big-number .unit {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: var(--text-secondary);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .stat-value {
            font-weight: 600;
            white-space: nowrap;
            text-align: right;
        }

        .stat-value.merchant { color: var(--accent-green); }
        .stat-value.project { color: var(--accent-blue); }

        .chart-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .chart-container h2 {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .chart-wrapper {
            position: relative;
            height: 300px;
        }

        .leaderboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(350px, 100%), 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .leaderboard-item {
            background: var(--bg-secondary);
            border-radius: 8px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .leaderboard-header {
            display: flex;
            align-items: center;
            padding: 12px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            user-select: none;
        }

        @media (hover: hover) {
            .leaderboard-header:hover {
                background: var(--bg-card);
            }
        }

        .leaderboard-item.expanded .leaderboard-header {
            background: var(--bg-card);
        }

        .leaderboard-rank {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, rgba(247, 147, 26, 0.15), rgba(247, 147, 26, 0.05));
            color: var(--accent-orange);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .leaderboard-info {
            flex: 1;
            min-width: 0;
        }

        .leaderboard-name {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .leaderboard-count {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .leaderboard-payments {
            color: var(--accent-orange);
            margin-left: 10px;
            flex-shrink: 0;
            white-space: nowrap;
            font-size: 0.9rem;
        }

        .leaderboard-expand {
            margin-left: 8px;
            color: var(--text-secondary);
            transition: transform 0.2s ease;
        }

        .leaderboard-item.expanded .leaderboard-expand {
            transform: rotate(180deg);
        }

        .leaderboard-posts {
            display: none;
            padding: 0 0 12px 0;
            border-top: 1px solid var(--border);
        }

        .leaderboard-item.expanded .leaderboard-posts {
            display: block;
        }

        .post-link {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 10px 12px;
            margin-top: 8px;
            margin-left: 12px;
            margin-right: 12px;
            background: var(--bg-primary);
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
            transition: background 0.2s ease;
        }

        .post-link:hover {
            background: var(--bg-card);
        }

        .post-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .post-platform {
            color: var(--accent-blue);
            font-weight: 600;
        }

        .post-name {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .post-date {
            color: var(--text-secondary);
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        .leaderboard-hidden {
            display: none !important;
        }

        .leaderboard-more {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            background: var(--bg-secondary);
            border: 1px dashed var(--border);
            border-radius: 8px;
            color: var(--accent-blue);
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        @media (hover: hover) {
            .leaderboard-more:hover {
                background: var(--bg-card);
                border-color: var(--accent-blue);
            }
        }

        .today-video-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin-bottom: 8px;
            background: var(--bg-secondary);
            border-radius: 8px;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        @media (hover: hover) {
            .today-video-item:hover {
                background: var(--bg-card);
            }
        }

        .today-video-icon {
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .today-video-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .today-video-project {
            color: var(--text-primary);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .today-video-merchant {
            color: var(--text-secondary);
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .today-video-time {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-left: auto;
            flex-shrink: 0;
        }


        .insights-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
            align-items: stretch;
        }

        @media (max-width: 900px) {
            .insights-grid {
                grid-template-columns: 1fr;
            }
        }

        .pie-chart-wrapper {
            position: relative;
            width: 240px;
            height: 240px;
            margin: 0 auto;
        }

        .countries-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .country-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--bg-secondary);
            padding: 6px 10px;
            border-radius: 16px;
            font-size: 0.85rem;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.2s;
            cursor: pointer;
        }

        .country-tag:hover {
            background: var(--accent-blue);
            color: white;
            transform: translateY(-2px);
        }

        .country-flag {
            font-size: 1.1rem;
        }

        .country-name {
            color: var(--text-primary);
        }

        .country-count {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .insight-card {
            text-align: center;
        }

        .insight-card h2 {
            text-align: center;
        }

        .insight-total {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-orange);
            margin-bottom: 15px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #f85149;
        }

        /* Countdown & Highlights Section */
        .live-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .live-grid {
                grid-template-columns: 1fr;
            }
        }

        .card.countdown {
            background: linear-gradient(135deg, rgba(63, 185, 80, 0.15), rgba(63, 185, 80, 0.05));
            border-color: var(--accent-green);
            display: flex;
            flex-direction: column;
        }

        .card.countdown h2 {
            color: var(--accent-green);
        }

        #countdown-content {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .countdown-content {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .countdown-blocks {
            margin-bottom: 15px;
        }

        .countdown-blocks .big-number {
            color: var(--accent-green);
            animation: subtlePulse 3s ease-in-out infinite;
        }

        .burn-status {
            animation: subtlePulse 3s ease-in-out infinite;
        }

        .countdown-progress {
            width: 100%;
            height: 8px;
            background: var(--bg-primary);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .countdown-progress-bar {
            height: 100%;
            background: var(--accent-green);
            border-radius: 4px;
            transition: width 0.5s ease;
            animation: subtlePulse 3s ease-in-out infinite;
        }

        /* Subtle ambient pulse */
        @keyframes subtlePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* New block event flash */
        .countdown-blocks.new-block .big-number {
            animation: blockFlash 0.6s ease-out;
        }

        .countdown-progress-bar.new-block {
            animation: barFlash 0.6s ease-out;
        }

        @keyframes blockFlash {
            0% {
                text-shadow: 0 0 20px var(--accent-green), 0 0 40px var(--accent-green);
                transform: scale(1.05);
            }
            100% {
                text-shadow: none;
                transform: scale(1);
            }
        }

        @keyframes barFlash {
            0% {
                box-shadow: 0 0 15px var(--accent-green), 0 0 30px var(--accent-green);
            }
            100% {
                box-shadow: none;
            }
        }

        .countdown-stats {
            margin-top: auto;
        }

        .countdown-complete {
            text-align: center;
            padding: 20px 0;
            margin-top: auto;
        }

        .countdown-complete .checkmark {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        .countdown-complete .message {
            color: var(--accent-green);
            font-weight: 600;
            font-size: 1.1rem;
        }

        .card.highlights {
            background: linear-gradient(135deg, rgba(88, 166, 255, 0.15), rgba(88, 166, 255, 0.05));
            border-color: var(--accent-blue);
            display: flex;
            flex-direction: column;
        }

        .card.highlights h2 {
            color: var(--accent-blue);
        }

        #highlights-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        #highlights-list .stat-row {
            perspective: 1000px;
        }

        /* Airport ticker flip animation */
        @keyframes flipHighlight {
            0% {
                transform: rotateX(0deg);
                opacity: 1;
            }
            45% {
                transform: rotateX(90deg);
                opacity: 0;
            }
            55% {
                transform: rotateX(-90deg);
                opacity: 0;
            }
            100% {
                transform: rotateX(0deg);
                opacity: 1;
            }
        }

        /* Stagger the flip animation for each row */
        #highlights-list.flipping .stat-row:nth-child(1) {
            animation: flipHighlight 0.6s ease-in-out 0s;
        }

        #highlights-list.flipping .stat-row:nth-child(2) {
            animation: flipHighlight 0.6s ease-in-out 0.15s;
        }

        #highlights-list.flipping .stat-row:nth-child(3) {
            animation: flipHighlight 0.6s ease-in-out 0.3s;
        }

        #highlights-list.flipping .stat-row:nth-child(4) {
            animation: flipHighlight 0.6s ease-in-out 0.45s;
        }

        #highlights-list.flipping .stat-row:nth-child(5) {
            animation: flipHighlight 0.6s ease-in-out 0.6s;
        }

        /* Project Info Banner */
        .project-info-banner {
            background: linear-gradient(135deg, rgba(88, 166, 255, 0.15), rgba(88, 166, 255, 0.05));
            padding: 12px 16px;
            margin-bottom: 12px;
            display: grid;
            gap: 8px;
        }

        .project-info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .project-info-icon {
            flex-shrink: 0;
            font-size: 1rem;
        }

        .project-info-label {
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .project-info-value {
            color: var(--text-primary);
            font-family: monospace;
            word-break: break-all;
        }

        .project-info-link {
            color: var(--accent-blue);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .project-info-link:hover {
            color: #79b8ff;
            text-decoration: underline;
        }

        .view-profile-button {
            margin-bottom: 12px;
        }

        .view-profile-button a {
            display: block;
            background: var(--accent-blue);
            color: var(--bg-primary);
            text-align: center;
            padding: 12px 16px;
            border-radius: 6px 6px 0 0;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.2s ease;
        }

        .view-profile-button a:hover {
            background: #79b8ff;
        }

        .view-all-button {
            margin-top: 12px;
            margin-bottom: -12px;
        }

        .view-all-button a {
            display: block;
            background: var(--accent-blue);
            color: var(--bg-primary);
            text-align: center;
            padding: 12px 16px;
            border-radius: 0 0 6px 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.2s ease;
        }

        .view-all-button a:hover {
            background: #79b8ff;
        }

        @media (max-width: 600px) {
            nav .container {
                justify-content: center;
            }

            header h1 {
                font-size: 1.8rem;
            }
            .big-number, .burn-status {
                font-size: 2rem;
            }
            .leaderboard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation (loaded from includes/nav.html) -->
    <div id="site-nav"></div>

    <div class="container">
        <header>
            <div class="header-content">
                <a href="about.html" title="About PoWBoT">
                    <img
                        src="images/PoWBoT_mascot_240px.png"
                        alt="PoWBoT Mascot"
                        class="mascot-icon"
                    >
                </a>
                <div class="header-text">
                    <h1>PoWBoT Stats</h1>
                    <p class="tagline" id="tagline">Stay humble, stack stats 📊</p>
                </div>
            </div>
        </header>

        <!-- Quick Links Navigation -->
        <div class="quick-links">
            <a href="members.html" class="quick-link-btn">
                <span class="quick-link-icon">👥</span>
                <div class="quick-link-text">
                    <div class="quick-link-title">CBAF Members</div>
                    <div class="quick-link-subtitle">Support projects directly</div>
                </div>
            </a>
            <a href="archive.html" class="quick-link-btn">
                <span class="quick-link-icon">📚</span>
                <div class="quick-link-text">
                    <div class="quick-link-title">Historical Archive</div>
                    <div class="quick-link-subtitle">Epoch 4 & earlier</div>
                </div>
            </a>
        </div>

        <!-- Launch Announcement Banner -->
        <div class="launch-banner">
            <h2>🚀 Epoch 5 is Live!</h2>
            <p>The new epoch has launched. Track real-time activity and support projects across Africa.</p>
        </div>

        <div id="content">
            <div class="loading">Loading stats...</div>
        </div>

        <!-- Footer (loaded from includes/footer.html) -->
        <div id="site-footer"></div>
    </div>

    <!-- Shared nav/footer injection - load first -->
    <script src="includes/inject.js"></script>

    <script>
        // Global project metadata
        let projectMetadata = {};

        // Format numbers with commas
        function formatNumber(num) {
            return num.toLocaleString();
        }

        // Format date for display
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const day = date.getDate();
            const month = date.toLocaleDateString('en-US', { month: 'short' });
            const year = date.getFullYear();
            return `${day} ${month} ${year}`;
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }


        // Render the dashboard
        function renderDashboard(stats) {
            const content = document.getElementById('content');
            document.getElementById('tagline').textContent = stats.tagline;

            // Update timestamp (may not exist yet if footer is still loading)
            const updatedElement = document.getElementById('updated');
            if (updatedElement) {
                updatedElement.textContent = new Date(stats.generated_at).toLocaleString();
            }

            // Store burn rate data for countdown display
            burnRateData = stats.burn_rate || null;

            content.innerHTML = `
                <!-- Summary Cards -->
                <div class="stats-grid">
                    <div class="card top-performers">
                        <h2>Top Performers (24h)</h2>
                        <div class="big-number">🏆</div>
                        <div class="top-performers-list" id="top-performers-list">
                            <!-- Populated by JavaScript -->
                        </div>
                    </div>

                    <div class="card epoch-overview-card">
                        <h2>Epoch Overview</h2>
                        <div class="epoch-overview-stats">
                            <div class="stat-row">
                                <span class="stat-label">Active Projects</span>
                                <span class="stat-value" style="color: var(--accent-orange);">${formatNumber(stats.top_projects?.length || 0)}</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">Active Merchants</span>
                                <span class="stat-value" style="color: var(--accent-orange);">${formatNumber(stats.top_merchants?.length || 0)}</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">Posts Approved</span>
                                <span class="stat-value" style="color: var(--accent-orange);">${formatNumber(stats.reviewer?.approved || 0)}</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">Countries Reached</span>
                                <span class="stat-value" style="color: var(--accent-orange);">${formatNumber(stats.countries?.length || 0)}</span>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <h2>Approval Rate</h2>
                        <div class="big-number">${stats.reviewer?.total_reviewed > 0 ? Math.round((stats.reviewer.approved / stats.reviewer.total_reviewed) * 100) : 0}<span class="unit">%</span></div>
                        <div style="margin-top: 15px;">
                            <div class="stat-row">
                                <span class="stat-label">Approved</span>
                                <span class="stat-value" style="color: var(--accent-green);">${formatNumber(stats.reviewer?.approved || 0)}</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">Rejected</span>
                                <span class="stat-value" style="color: #f85149;">${formatNumber(stats.reviewer?.rejected || 0)}</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">Total reviewed</span>
                                <span class="stat-value">${formatNumber(stats.reviewer?.total_reviewed || 0)}</span>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <h2>Since Launch${stats.launch.days_active > 0 ? ` (${stats.launch.date})` : ''}</h2>
                        <div class="big-number">${stats.launch.days_active}<span class="unit"> days</span></div>
                        <div style="margin-top: 15px;">
                            <div class="stat-row">
                                <span class="stat-label" style="font-weight: 600;">Daily Averages</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">Posts approved</span>
                                <span class="stat-value" style="color: var(--accent-orange);">${stats.launch.days_active > 0 ? Math.round((stats.totals.by_type.project?.count || 0) / stats.launch.days_active) : 0}</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">Total payments</span>
                                <span class="stat-value" style="color: var(--accent-orange);">${formatNumber(stats.launch.daily_average_payments || 0)}</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Countries Banner -->
                ${(stats.countries?.length || 0) > 0 ? `
                <div class="card" style="margin-bottom: 20px; padding: 16px 24px;">
                    <div class="countries-banner-content">
                        <h2 style="margin: 0;">${stats.countries?.length || 0} ${(stats.countries?.length || 0) === 1 ? 'Country' : 'Countries'} Active</h2>
                        <div class="countries-banner-list" id="countries-list">
                            ${(stats.countries || []).map(c => `
                                <a href="members.html?filter=epoch5&country=${encodeURIComponent(c.flag + ' ' + c.country)}" class="country-tag">
                                    <span class="country-flag">${c.flag}</span>
                                    <span class="country-name">${c.country}</span>
                                    ${c.count > 1 ? `<span class="country-count">(${c.count})</span>` : ''}
                                </a>
                            `).join('')}
                        </div>
                    </div>
                </div>
                ` : ''}

                <!-- Live Block Countdown & Highlights -->
                <div class="live-grid">
                    <div class="card countdown">
                        <h2>PoWBoT Difficulty Adjustment</h2>
                        <div id="countdown-content">
                            <div class="loading">Connecting to mempool...</div>
                        </div>
                    </div>

                    <div class="card highlights">
                        <h2>Highlights</h2>
                        <div class="highlights-list" id="highlights-list">
                            <!-- Populated by JavaScript -->
                        </div>
                    </div>
                </div>

                <!-- Last 24h Activity Banner -->
                ${(stats.last_24h?.posts || 0) > 0 ? `
                <div class="today-banner">
                    <span class="today-label">Last 24h <span class="today-time">(updated ${new Date(stats.generated_at).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'Africa/Johannesburg' })} CAT)</span></span>
                    <div class="today-stats">
                        <div class="today-stat">
                            <span class="today-value" style="color: var(--accent-orange);">${formatNumber(stats.last_24h?.posts || 0)}</span>
                            <span class="today-unit">${(stats.last_24h?.posts || 0) === 1 ? 'post' : 'posts'}</span>
                        </div>
                        <div class="today-stat">
                            <span class="today-value" style="color: var(--accent-green);">${formatNumber(stats.last_24h?.approved || 0)}</span>
                            <span class="today-unit">${(stats.last_24h?.approved || 0) === 1 ? 'approval' : 'approvals'}</span>
                        </div>
                        ${(stats.last_24h?.pending || 0) > 0 ? `
                        <div class="today-stat">
                            <span class="today-value" style="color: var(--text-secondary);">${formatNumber(stats.last_24h?.pending || 0)}</span>
                            <span class="today-unit">${(stats.last_24h?.pending || 0) === 1 ? 'pending' : 'pending'}</span>
                        </div>
                        ` : ''}
                        <div class="today-stat">
                            <span class="today-value" style="color: #f85149;">${formatNumber(stats.last_24h?.rejected || 0)}</span>
                            <span class="today-unit">${(stats.last_24h?.rejected || 0) === 1 ? 'rejection' : 'rejections'}</span>
                        </div>
                    </div>
                </div>
                ` : ''}

                <!-- Last 24h Videos by Platform -->
                ${(stats.last_24h.videos && stats.last_24h.videos.length > 0) ? `
                <div class="leaderboard-grid">
                    <div class="card">
                        <h2>Last 24h on X</h2>
                        <div id="today-x"></div>
                    </div>

                    <div class="card">
                        <h2>Last 24h on Nostr</h2>
                        <div id="today-nostr"></div>
                    </div>
                </div>
                ` : ''}

                <!-- Leaderboards -->
                ${((stats.top_projects?.length || 0) > 0 || (stats.top_merchants?.length || 0) > 0) ? `
                <div class="leaderboard-grid">
                    ${(stats.top_projects?.length || 0) > 0 ? `
                    <div class="card">
                        <h2>Project Leaderboard</h2>
                        <div id="top-projects"></div>
                    </div>
                    ` : ''}

                    ${(stats.top_merchants?.length || 0) > 0 ? `
                    <div class="card">
                        <h2>Merchant Leaderboard</h2>
                        <div id="top-merchants"></div>
                    </div>
                    ` : ''}
                </div>
                ` : ''}

                <!-- Last 7 Days Banner -->
                ${(stats.last_7d?.posts || 0) > 0 ? `
                <div class="week-banner">
                    <span class="week-label">Last 7 Days</span>
                    <div class="week-stats">
                        <div class="week-stat">
                            <span class="week-value" style="color: var(--accent-purple);">${formatNumber(stats.last_7d?.posts || 0)}</span>
                            <span class="week-unit">${(stats.last_7d?.posts || 0) === 1 ? 'post' : 'posts'}</span>
                        </div>
                        <div class="week-stat">
                            <span class="week-value" style="color: var(--accent-green);">${formatNumber(stats.last_7d?.approved || 0)}</span>
                            <span class="week-unit">${(stats.last_7d?.approved || 0) === 1 ? 'approval' : 'approvals'}</span>
                        </div>
                        ${(stats.last_7d?.pending || 0) > 0 ? `
                        <div class="week-stat">
                            <span class="week-value" style="color: var(--text-secondary);">${formatNumber(stats.last_7d?.pending || 0)}</span>
                            <span class="week-unit">${(stats.last_7d?.pending || 0) === 1 ? 'pending' : 'pending'}</span>
                        </div>
                        ` : ''}
                        <div class="week-stat">
                            <span class="week-value" style="color: #f85149;">${formatNumber(stats.last_7d?.rejected || 0)}</span>
                            <span class="week-unit">${(stats.last_7d?.rejected || 0) === 1 ? 'rejection' : 'rejections'}</span>
                        </div>
                    </div>
                </div>
                ` : ''}

                <!-- Daily Chart -->
                <div class="chart-container">
                    <h2>Daily Activity</h2>
                    <div class="chart-wrapper">
                        <canvas id="dailyChart"></canvas>
                    </div>
                </div>

                <!-- Insights Section -->
                ${((stats.lightning_providers?.length || 0) > 0 || (stats.countries?.length || 0) > 0 || (stats.platforms?.length || 0) > 0) ? `
                <div class="insights-grid">
                    ${(stats.countries?.length || 0) > 0 ? `
                    <div class="card insight-card">
                        <h2>${stats.countries?.length || 0} ${(stats.countries?.length || 0) === 1 ? 'Country' : 'Countries'} Active</h2>
                        <div class="pie-chart-wrapper">
                            <canvas id="countriesChart"></canvas>
                        </div>
                    </div>
                    ` : ''}

                    <div class="card insight-card">
                        <h2>Total Posts Over All Time: ${formatNumber(2867 + (stats.reviewer?.approved || 0))}</h2>
                        <div class="chart-wrapper" style="height: 240px;">
                            <canvas id="epochsChart"></canvas>
                        </div>
                    </div>

                    ${(stats.platforms?.length || 0) > 0 ? `
                    <div class="card insight-card">
                        <h2>Platforms</h2>
                        <div class="pie-chart-wrapper">
                            <canvas id="platformChart"></canvas>
                        </div>
                    </div>
                    ` : ''}
                </div>
                ` : ''}
            `;

            // Render leaderboards (only if they exist)
            if ((stats.top_projects?.length || 0) > 0) {
                renderLeaderboard('top-projects', stats.top_projects, 'project');
            }
            if ((stats.top_merchants?.length || 0) > 0) {
                renderLeaderboard('top-merchants', stats.top_merchants, 'merchant');
            }

            // Render last 24h videos if any
            if (stats.last_24h.videos && stats.last_24h.videos.length > 0) {
                const xVideos = stats.last_24h.videos.filter(v => v.platform === 'X');
                const nostrVideos = stats.last_24h.videos.filter(v => v.platform === 'Nostr');
                renderTodayVideos('today-x', xVideos, '𝕏');
                renderTodayVideos('today-nostr', nostrVideos, '🟣');
            }

            // Render top performers (always show card, with empty state message if needed)
            renderTopPerformers(stats.last_24h?.videos || []);

            // Render charts
            renderChart(stats.daily);
            if ((stats.countries?.length || 0) > 0) {
                renderCountriesChart(stats.countries);
            }
            if ((stats.platforms?.length || 0) > 0) {
                renderPlatformChart(stats.platforms);
            }
            renderEpochsChart(stats.reviewer?.approved || 0);

            // Render live sections
            initBlockCountdown();
            renderHighlights(stats);
        }

        function getPlatform(url) {
            if (!url) return { name: 'Nostr', icon: '🟣' };
            const lower = url.toLowerCase();
            if (lower.includes('twitter.com') || lower.includes('x.com')) return { name: 'X', icon: '𝕏' };
            return { name: 'Nostr', icon: '🟣' };
        }

        function renderProjectInfoBanner(projectName) {
            const metadata = projectMetadata[projectName];
            if (!metadata) return '';

            const parts = [];

            // Location
            if (metadata.country) {
                const location = metadata.city ? `${metadata.city}, ${metadata.country}` : metadata.country;
                parts.push(`
                    <div class="project-info-row">
                        <span class="project-info-icon">📍</span>
                        <span class="project-info-value">${location}</span>
                    </div>
                `);
            }

            // Lightning address
            if (metadata.lightning) {
                parts.push(`
                    <div class="project-info-row">
                        <span class="project-info-icon">⚡</span>
                        <span class="project-info-value">${metadata.lightning}</span>
                    </div>
                `);
            }

            // More info link
            if (metadata.info_url) {
                parts.push(`
                    <div class="project-info-row">
                        <span class="project-info-icon">🔗</span>
                        <a href="${metadata.info_url}" class="project-info-link">More Info →</a>
                    </div>
                `);
            }

            if (parts.length === 0) return '';

            return `
                <div class="project-info-banner">
                    ${parts.join('')}
                </div>
            `;
        }

        function renderViewProfileButton(name, type = 'project') {
            // Convert name to profile ID (e.g., "Bitcoin Ekasi 🇿🇦" -> "bitcoin-ekasi")
            const profileId = name
                .replace(/[^\w\s-]/g, '') // Remove emojis and special characters
                .trim()
                .toLowerCase()
                .replace(/\s+/g, '-'); // Replace spaces with hyphens

            const profileUrl = type === 'merchant' ? 'merchant-profile.html' : 'profile.html';

            return `
                <div class="view-profile-button">
                    <a href="${profileUrl}?id=${profileId}">View Profile →</a>
                </div>
            `;
        }

        function renderViewAllButton(name, type, postCount) {
            // Convert name to profile ID
            const profileId = name
                .replace(/[^\w\s-]/g, '')
                .trim()
                .toLowerCase()
                .replace(/\s+/g, '-');

            const profileUrl = type === 'merchant' ? 'merchant-profile.html' : 'profile.html';

            return `
                <div class="view-all-button">
                    <a href="${profileUrl}?id=${profileId}">View all ${postCount} posts →</a>
                </div>
            `;
        }

        function renderLeaderboard(elementId, items, type) {
            const container = document.getElementById(elementId);
            const initialCount = 5;
            const hasMore = items.length > initialCount;

            container.innerHTML = items.map((item, index) => {
                const posts = item.posts || [];
                const hasPosts = posts.length > 0;
                const isHidden = index >= initialCount;

                // Generate view profile button for projects and merchants
                const viewProfileButton = renderViewProfileButton(item.name, type);

                return `
                <div class="leaderboard-item ${isHidden ? 'leaderboard-hidden' : ''}" data-index="${index}">
                    <div class="leaderboard-header" onclick="toggleLeaderboard(this)">
                        <div class="leaderboard-rank">${index + 1}</div>
                        <div class="leaderboard-info">
                            <div class="leaderboard-name">${item.name}</div>
                        </div>
                        <div class="leaderboard-payments">${item.count} ${item.count === 1 ? 'post' : 'posts'}</div>
                        ${hasPosts ? '<span class="leaderboard-expand">▼</span>' : ''}
                    </div>
                    ${hasPosts ? `
                    <div class="leaderboard-posts">
                        ${viewProfileButton}
                        ${posts.slice(0, 10).map(post => {
                            const platform = getPlatform(post.url);
                            const postLabel = type === 'project' ? (post.merchant || item.name) : (post.project || item.name);
                            return `
                            <a href="${post.url}" target="_blank" rel="noopener" class="post-link">
                                <span class="post-info">
                                    <span class="post-platform">${platform.name}</span>
                                    <span class="post-name">${postLabel}</span>
                                </span>
                                <span class="post-date">${formatDate(post.date)}</span>
                            </a>
                        `}).join('')}
                        ${posts.length > 10 ? renderViewAllButton(item.name, type, posts.length) : ''}
                    </div>
                    ` : ''}
                </div>
            `}).join('');

            if (hasMore) {
                container.innerHTML += `
                    <button class="leaderboard-more" data-count="${items.length - initialCount}" onclick="toggleShowMore(this, '${elementId}')">
                        Show ${items.length - initialCount} more
                    </button>
                `;
            }
        }

        function toggleShowMore(button, elementId) {
            const container = document.getElementById(elementId);
            const isExpanded = button.classList.contains('expanded');
            const count = button.dataset.count;

            if (isExpanded) {
                container.querySelectorAll('.leaderboard-item').forEach((el, index) => {
                    if (index >= 5) el.classList.add('leaderboard-hidden');
                });
                button.textContent = `Show ${count} more`;
                button.classList.remove('expanded');
            } else {
                container.querySelectorAll('.leaderboard-hidden').forEach(el => {
                    el.classList.remove('leaderboard-hidden');
                });
                button.textContent = 'Show less';
                button.classList.add('expanded');
            }
        }

        function toggleLeaderboard(header) {
            const item = header.closest('.leaderboard-item');
            const posts = item.querySelector('.leaderboard-posts');
            if (posts) {
                item.classList.toggle('expanded');
            }
        }

        function renderTodayVideos(elementId, videos, icon) {
            const container = document.getElementById(elementId);
            if (!container) return;

            if (videos.length === 0) {
                container.innerHTML = '<div style="color: var(--text-secondary); padding: 12px;">No posts yet</div>';
                return;
            }

            const initialCount = 5;
            const hasMore = videos.length > initialCount;

            container.innerHTML = videos.map((video, index) => {
                const isHidden = index >= initialCount;
                return `
                <a href="${escapeHtml(video.url)}" target="_blank" rel="noopener" class="today-video-item ${isHidden ? 'leaderboard-hidden' : ''}" data-index="${index}">
                    <span class="today-video-icon">${icon}</span>
                    <span class="today-video-info">
                        <span class="today-video-project">${escapeHtml(video.project)}</span>

        // Block countdown configuration
        const GENESIS_BLOCK = 932631; // First epoch started here (calculated from epoch 6 start: 937671 - (5 * 1008))
        const BLOCKS_PER_EPOCH = 1008; // Blocks per difficulty adjustment period

        // Block countdown state
        let currentBlockHeight = null;
        let blockTimeAvg = 600000; // Default 10 minutes in ms
        let countdownWebSocket = null;
        let burnRateData = null; // From stats.json burn_rate

        function renderCountdown() {
            const container = document.getElementById('countdown-content');
            if (!container || currentBlockHeight === null) return;

            // Automatically calculate current epoch and next adjustment
            const currentEpoch = Math.floor((currentBlockHeight - GENESIS_BLOCK) / BLOCKS_PER_EPOCH);
            const currentEpochStart = GENESIS_BLOCK + (currentEpoch * BLOCKS_PER_EPOCH);
            const nextAdjustmentBlock = GENESIS_BLOCK + ((currentEpoch + 1) * BLOCKS_PER_EPOCH);

            const blocksRemaining = nextAdjustmentBlock - currentBlockHeight;
            const blocksPassed = currentBlockHeight - currentEpochStart;

            // Show celebration for first 3 blocks of new epoch
            if (blocksPassed < 3) {
                container.innerHTML = `
                    <div class="countdown-content">
                        <div class="countdown-complete">
                            <div class="checkmark">✓</div>
                            <div class="message">New rates now active!</div>
                        </div>
                        <div class="countdown-stats" style="margin-top: 16px;">
                            <div class="stat-row">
                                <span class="stat-label">Current block</span>
                                <span class="stat-value" style="color: var(--accent-green);">${formatNumber(currentBlockHeight)}</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">Next adjustment</span>
                                <span class="stat-value" style="color: var(--accent-green);">${formatNumber(nextAdjustmentBlock)}</span>
                            </div>
                        </div>
                    </div>
                `;
                return;
            }

            // Calculate progress and time
            const totalBlocks = BLOCKS_PER_EPOCH;
            const progressPercent = Math.min(100, Math.max(0, (blocksPassed / totalBlocks) * 100));

            const msRemaining = blocksRemaining * blockTimeAvg;
            const hoursRemaining = Math.floor(msRemaining / (1000 * 60 * 60));
            const minutesRemaining = Math.floor((msRemaining % (1000 * 60 * 60)) / (1000 * 60));

            // Build burn rate indicator
            let burnRateHtml = '';
            if (burnRateData) {
                const icon = burnRateData.status === 'hot' ? '🔥' : burnRateData.status === 'cold' ? '❄️' : '🎯';
                const color = burnRateData.status === 'hot' ? 'var(--accent-orange)' : burnRateData.status === 'cold' ? 'var(--accent-blue, #58a6ff)' : 'var(--accent-green)';
                burnRateHtml = `<div class="burn-status" style="font-weight: 700; color: ${color};">${icon} ${burnRateData.percentage}%</div>`;
            }

            container.innerHTML = `
                <div class="countdown-content">
                    <div class="countdown-blocks" style="display: flex; justify-content: space-between; align-items: baseline;">
                        <div class="big-number">${formatNumber(blocksRemaining)} <span class="unit">blocks</span></div>
                        ${burnRateHtml}
                    </div>
                    <div class="countdown-progress">
                        <div class="countdown-progress-bar" style="width: ${progressPercent}%"></div>
                    </div>
                    <div class="countdown-stats">
                        <div class="stat-row">
                            <span class="stat-label">Current block</span>
                            <span class="stat-value" style="color: var(--accent-green);">${formatNumber(currentBlockHeight)}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Target block</span>
                            <span class="stat-value" style="color: var(--accent-green);">${formatNumber(nextAdjustmentBlock)}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Est. time</span>
                            <span class="stat-value" style="color: var(--accent-green);">~${hoursRemaining}h ${minutesRemaining}m</span>
                        </div>
                    </div>
                </div>
            `;
        }

        async function initBlockCountdown() {
            try {
                // Fetch initial block height
                const heightResponse = await fetch('https://mempool.space/api/blocks/tip/height');
                currentBlockHeight = await heightResponse.json();

                // Fetch difficulty data for average block time
                const diffResponse = await fetch('https://mempool.space/api/v1/difficulty-adjustment');
                const diffData = await diffResponse.json();
                if (diffData.timeAvg) {
                    blockTimeAvg = diffData.timeAvg;
                }

                renderCountdown();

                // Connect to WebSocket for live updates
                connectBlockWebSocket();
            } catch (error) {
                console.error('Failed to init block countdown:', error);
                const container = document.getElementById('countdown-content');
                if (container) {
                    container.innerHTML = `<div class="error">Failed to load block data</div>`;
                }
            }
        }

        function triggerNewBlockFlash() {
            const blocksEl = document.querySelector('.countdown-blocks');
            const barEl = document.querySelector('.countdown-progress-bar');

            if (blocksEl) {
                blocksEl.classList.add('new-block');
                setTimeout(() => blocksEl.classList.remove('new-block'), 600);
            }
            if (barEl) {
                barEl.classList.add('new-block');
                setTimeout(() => barEl.classList.remove('new-block'), 600);
            }
        }

        function connectBlockWebSocket() {
            if (countdownWebSocket) {
                countdownWebSocket.close();
            }

            countdownWebSocket = new WebSocket('wss://mempool.space/api/v1/ws');

            countdownWebSocket.onopen = () => {
                // Subscribe to new blocks
                countdownWebSocket.send(JSON.stringify({ action: 'want', data: ['blocks'] }));
            };

            countdownWebSocket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.block && data.block.height) {
                    currentBlockHeight = data.block.height;
                    renderCountdown();
                    triggerNewBlockFlash();
                }
            };

            countdownWebSocket.onerror = (error) => {
                console.error('WebSocket error:', error);
            };

            countdownWebSocket.onclose = () => {
                // Reconnect after 5 seconds
                setTimeout(connectBlockWebSocket, 5000);
            };
        }

        // Highlights state

        function generateHighlights(stats) {
            const highlights = [];
            const stripFlags = (name) => name.replace(/[\u{1F1E6}-\u{1F1FF}]{2}/gu, '').trim();

            // Countries active
            const countryCount = stats.countries?.length || 0;
            if (countryCount > 0) {
                highlights.push({
                    label: '🌍 Countries active',
                    value: countryCount
                });
            }

            // Country firsts (countries with only 1 project)
            if (stats.countries) {
                const newCountries = stats.countries.filter(c => c.count === 1);
                newCountries.forEach(c => {
                    highlights.push({
                        label: `🎉 First from ${c.country}`,
                        value: c.flag
                    });
                });
            }

            // Approval record
            if (stats.daily && stats.daily.length > 0) {
                const recordDay = stats.daily.reduce((max, day) =>
                    (day.project_count > (max?.project_count || 0)) ? day : max, null);
                if (recordDay && recordDay.project_count > 0) {
                    highlights.push({
                        label: `📈 Approval record <span style="white-space: nowrap;">(${formatDate(recordDay.date)})</span>`,
                        value: `${recordDay.project_count} posts`
                    });
                }
            }

            // Top project
            if (stats.top_projects && stats.top_projects.length > 0) {
                const top = stats.top_projects[0];
                highlights.push({
                    label: '🏆 Top project',
                    value: stripFlags(top.name)
                });
            }

            // Newest project (find project with most recent first post)
            if (stats.top_projects && stats.top_projects.length > 0) {
                let newestProject = null;
                let newestFirstDate = null;

                stats.top_projects.forEach(project => {
                    if (project.posts && project.posts.length > 0) {
                        // Find the earliest post date for this project
                        const dates = project.posts.map(p => p.date).sort();
                        const firstDate = dates[0];

                        if (!newestFirstDate || firstDate > newestFirstDate) {
                            newestFirstDate = firstDate;
                            newestProject = project;
                        }
                    }
                });

                if (newestProject && newestProject !== stats.top_projects[0]) {
                    highlights.push({
                        label: '✨ Newest project',
                        value: stripFlags(newestProject.name)
                    });
                }
            }

            // Projects count
            const projectCount = stats.top_projects?.length || 0;
            if (projectCount > 0) {
                highlights.push({
                    label: '📊 Active projects',
                    value: projectCount
                });
            }

            // Merchants count
            const merchantCount = stats.top_merchants?.length || 0;
            if (merchantCount > 0) {
                highlights.push({
                    label: '🏪 Active merchants',
                    value: merchantCount
                });
            }

            // Approval rate highlight if good
            const approvalRate = stats.reviewer?.total_reviewed > 0
                ? Math.round((stats.reviewer.approved / stats.reviewer.total_reviewed) * 100)
                : 0;
            if (approvalRate >= 90) {
                highlights.push({
                    label: '✅ Approval rate',
                    value: `${approvalRate}%`
                });
            }

            // Days since launch
            if (stats.launch?.days_active > 0) {
                highlights.push({
                    label: '📅 Days active',
                    value: stats.launch.days_active
                });
            }

            // Platform distribution (X vs Nostr)
            if (stats.platforms && stats.platforms.length > 0) {
                const totalPlatforms = stats.platforms.reduce((sum, p) => sum + p.count, 0);
                stats.platforms.forEach(p => {
                    const percentage = Math.round((p.count / totalPlatforms) * 100);
                    highlights.push({
                        label: `📱 ${p.platform} posts`,
                        value: `${percentage}%`
                    });
                });
            }

            // Top Lightning provider
            if (stats.lightning_providers && stats.lightning_providers.length > 0) {
                const top = stats.lightning_providers[0];
                highlights.push({
                    label: '⚡ Top LN provider',
                    value: top.domain
                });
            }

            // Top merchant
            if (stats.top_merchants && stats.top_merchants.length > 0) {
                const top = stats.top_merchants[0];
                highlights.push({
                    label: '🏅 Top merchant',
                    value: top.name
                });
            }

            // Most active country
            if (stats.countries && stats.countries.length > 0) {
                const top = stats.countries[0];
                highlights.push({
                    label: '🌐 Most active',
                    value: `${top.flag} ${top.country}`
                });
            }

            // Total posts reviewed
            if (stats.reviewer?.total_reviewed > 0) {
                highlights.push({
                    label: '📝 Posts reviewed',
                    value: formatNumber(stats.reviewer.total_reviewed)
                });
            }

            // Average posts per day
            if (stats.launch?.days_active > 0 && stats.reviewer?.approved > 0) {
                const avgPerDay = Math.round(stats.reviewer.approved / stats.launch.days_active);
                highlights.push({
                    label: '📊 Avg posts/day',
                    value: avgPerDay
                });
            }

            return highlights;
        }

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

            const displayCount = 5;

            for (let i = 0; i < displayCount && i < allHighlights.length; i++) {
                const idx = (highlightIndex + i) % allHighlights.length;
                toShow.push(allHighlights[idx]);
            }

            if (animate) {
                container.classList.add('flipping');

                // Update each row's content mid-flip (staggered timing)
                const rows = container.querySelectorAll('.stat-row');
                toShow.forEach((h, i) => {
                    const delay = (i * 150) + 300; // Stagger + mid-flip point
                    setTimeout(() => {
                        if (rows[i]) {
                            rows[i].innerHTML = `
                                <span class="stat-label">${h.label}</span>
                                <span class="stat-value" style="color: var(--accent-blue);">${h.value}</span>
                            `;
                        }
                    }, delay);
                });

                setTimeout(() => container.classList.remove('flipping'), 1800);
            } else {
                container.innerHTML = toShow.map(h => `
                    <div class="stat-row">
                        <span class="stat-label">${h.label}</span>
                        <span class="stat-value" style="color: var(--accent-blue);">${h.value}</span>
                    </div>
                `).join('');
            }
        }

        function rotateHighlights() {
            // Advance by 5 to get completely new set of highlights
            highlightIndex = (highlightIndex + 5) % allHighlights.length;
            displayHighlights(true);
        }

        function renderHighlights(stats) {
            const container = document.getElementById('highlights-list');
            if (!container) return;

            // Generate and shuffle highlights (randomised once on page load)
            allHighlights = shuffleArray(generateHighlights(stats));
            highlightIndex = 0;

            // Display first 5
            displayHighlights();

            // Start rotation (flip to new highlights every 8 seconds)
            if (highlightInterval) {
                clearInterval(highlightInterval);
            }
            highlightInterval = setInterval(rotateHighlights, 8000);
        }

        // Load and render stats
        async function loadStats() {
            try {
                // Load stats, members, and tracker data
                const [statsResponse, membersResponse, trackerResponse] = await Promise.all([
                    fetch('stats.json?t=' + Date.now()),
                    fetch('members.json?t=' + Date.now()).catch(() => null),
                    fetch('tracker-data.json?t=' + Date.now()).catch(() => null)
                ]);

                if (!statsResponse.ok) {
                    throw new Error(`HTTP ${statsResponse.status}`);
                }
                const stats = await statsResponse.json();

                // Build project metadata from members.json
                if (membersResponse && membersResponse.ok) {
                    const membersData = await membersResponse.json();
                    // Build lookup map: project name with flag → profile URL
                    membersData.members.forEach(member => {
                        // Index by both formats for compatibility
                        const shortKey = `${member.name} ${member.flag}`;  // "Bitbiashara 🇰🇪"
                        const longKey = member.name_with_flag;  // "Bitbiashara (Kenya) 🇰🇪"
                        const metadata = {
                            info_url: `profile.html?id=${member.id}`
                        };
                        projectMetadata[shortKey] = metadata;
                        projectMetadata[longKey] = metadata;
                    });
                }

                // Process tracker data for last 24h and last 7d stats
                if (trackerResponse && trackerResponse.ok) {
                    const trackerData = await trackerResponse.json();
                    const now = new Date();
                    const last24h = new Date(now.getTime() - 24 * 60 * 60 * 1000);
                    const last7d = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);

                    // Filter submissions for last 24h
                    const recentSubmissions = trackerData.submissions.filter(sub => {
                        const subDate = new Date(sub.timestamp.replace(' UTC', 'Z'));
                        return subDate >= last24h;
                    });

                    // Calculate last 24h stats
                    const approved = recentSubmissions.filter(sub => sub.status === 'Processed').length;
                    const rejected = recentSubmissions.filter(sub => sub.status === 'Rejected').length;
                    const pending = recentSubmissions.filter(sub => sub.status === 'Pending Review').length;
                    const totalPosts = recentSubmissions.length;

                    // Map to video format (only processed ones)
                    const recentVideos = recentSubmissions
                        .filter(sub => sub.status === 'Processed')
                        .map(sub => ({
                            project: sub.project_name,
                            merchant: sub.merchant_name,
                            platform: sub.platform,
                            url: sub.post_url
                        }));

                    // Add last 24h to stats object
                    stats.last_24h = stats.last_24h || {};
                    stats.last_24h.videos = recentVideos;
                    stats.last_24h.posts = totalPosts;
                    stats.last_24h.approved = approved;
                    stats.last_24h.rejected = rejected;
                    stats.last_24h.pending = pending;

                    // Filter submissions for last 7 days
                    const recent7dSubmissions = trackerData.submissions.filter(sub => {
                        const subDate = new Date(sub.timestamp.replace(' UTC', 'Z'));
                        return subDate >= last7d;
                    });

                    // Calculate last 7d stats
                    const approved7d = recent7dSubmissions.filter(sub => sub.status === 'Processed').length;
                    const rejected7d = recent7dSubmissions.filter(sub => sub.status === 'Rejected').length;
                    const pending7d = recent7dSubmissions.filter(sub => sub.status === 'Pending Review').length;
                    const totalPosts7d = recent7dSubmissions.length;

                    // Add last 7d to stats object
                    stats.last_7d = {
                        posts: totalPosts7d,
                        approved: approved7d,
                        rejected: rejected7d,
                        pending: pending7d
                    };
                }

                renderDashboard(stats);
            } catch (error) {
                console.error('Failed to load stats:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <p>Failed to load stats</p>
                        <p style="font-size: 0.9rem; margin-top: 10px;">${error.message}</p>
                    </div>
                `;
            }
        }

        // Initialize - wait for includes to load first
        window.includesLoaded.then(() => loadStats());
    </script>
</body>
</html>
