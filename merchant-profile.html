<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Merchant Profile | CBAF</title>
    <link rel="icon" type="image/png" sizes="32x32" href="images/stats_emoji_32px.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/stats_emoji_16px.png">
    <link rel="apple-touch-icon" sizes="180x180" href="images/stats_emoji_180px.png">
    <script src="qrcode.min.js"></script>

    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #21262d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-orange: #f7931a;
            --accent-green: #3fb950;
            --accent-blue: #58a6ff;
            --accent-purple: #a371f7;
            --border: #30363d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Navigation */
        nav {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;
            position: sticky;
            top: 0;
            margin: -20px -20px 20px -20px;
            z-index: 100;
        }

        nav .container {
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        nav a {
            color: var(--accent-blue);
            text-decoration: none;
            font-size: 0.9rem;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
            border-radius: 12px;
            padding: 40px 30px;
            margin-bottom: 24px;
            text-align: center;
        }

        .merchant-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            background: var(--bg-secondary);
            border: 4px solid var(--bg-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }

        .merchant-name {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--accent-green);
        }

        .merchant-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Stats Section - Two Column Layout */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        /* Support Card */
        .support-card {
            background: var(--bg-card);
            border: 1px solid var(--accent-orange);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
        }

        .support-card h2 {
            color: var(--accent-orange);
            font-size: 1.3rem;
            margin: 0;
            text-align: center;
        }

        .support-card p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin: 0;
            text-align: center;
        }

        .qr-container {
            margin: 8px auto;
            padding: 10px;
            background: white;
            border-radius: 8px;
            display: inline-block;
        }

        .qr-container canvas {
            display: block;
        }

        .address {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            background: var(--bg-secondary);
            padding: 6px 10px;
            border-radius: 6px;
            word-break: break-all;
            text-align: center;
            max-width: 100%;
            margin: 0;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .address:hover {
            background: rgba(88, 166, 255, 0.1);
            border-color: var(--accent-blue);
        }

        .address.copied {
            background: rgba(63, 185, 80, 0.2);
            color: var(--accent-green);
            border-color: var(--accent-green);
        }

        /* PoWBoT Overview Card */
        .overview-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .overview-card h2 {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: var(--text-secondary);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .stat-value {
            font-weight: 600;
            white-space: nowrap;
            text-align: right;
        }

        .big-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-orange);
            margin: 16px 0;
        }

        .big-number .unit {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* Activity Section */
        .section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .section h2 {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        .posts-list {
            display: flex;
            flex-direction: column;
        }

        .post-item {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 10px 12px;
            margin-top: 8px;
            background: var(--bg-primary);
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
            transition: background 0.2s ease;
            color: inherit;
        }

        .post-item:hover {
            background: var(--bg-card);
        }

        .post-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .post-platform {
            color: var(--accent-blue);
            font-weight: 600;
        }

        .post-project {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .post-date {
            color: var(--text-secondary);
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        .post-hidden {
            display: none;
        }

        .show-more-button {
            margin-top: 12px;
            padding: 10px 16px;
            background: var(--bg-primary);
            color: var(--accent-blue);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            width: 100%;
        }

        .show-more-button:hover {
            background: var(--bg-secondary);
            border-color: var(--accent-blue);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            nav .container {
                justify-content: center;
            }

            .hero {
                padding: 30px 20px;
            }

            .merchant-name {
                font-size: 1.5rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .support-card h2 {
                font-size: 1.1rem;
            }

            .stat-value {
                font-size: 0.9rem;
            }

            .big-number {
                font-size: 2rem;
            }
        }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        footer a {
            color: var(--accent-blue);
        }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <div class="nav-links">
                <a href="index.html">Stats</a>
                <span style="color: var(--text-secondary);">|</span>
                <a href="members.html">Directory</a>
                <span style="color: var(--text-secondary);">|</span>
                <a href="archive.html">Archive</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="hero">
            <div class="merchant-icon">🏪</div>
            <h1 class="merchant-name" id="merchant-name">Loading...</h1>
            <p class="merchant-subtitle" id="merchant-subtitle">Merchant Profile</p>
        </div>

        <div class="stats-grid" id="stats-grid">
            <!-- Stats will be inserted here -->
        </div>

        <div class="section">
            <h2>PoWBoT Activity</h2>
            <div class="posts-list" id="posts-list">
                <!-- Posts will be inserted here -->
            </div>
        </div>

        <div class="section" id="btcmap-section" style="display: none;">
            <h2>Profile on BTC Map</h2>
            <div id="btcmap-container">
                <iframe
                    id="btcmap-embed"
                    src=""
                    width="100%"
                    height="450px"
                    style="border: 1px solid var(--border); border-radius: 8px;"
                    allowfullscreen>
                </iframe>
                <p style="margin-top: 8px; font-size: 0.85rem; color: var(--text-secondary);">
                    <a href="" id="btcmap-link" target="_blank" rel="noopener" style="color: var(--accent-blue);">View on BTC Map ↗</a>
                </p>
            </div>
            <div id="btcmap-fallback" style="display: none; text-align: center; padding: 40px 20px; color: var(--text-secondary);">
                <p style="margin-bottom: 12px;">This merchant may be listed on BTC Map</p>
                <a href="" id="btcmap-search-link" target="_blank" rel="noopener"
                   style="display: inline-block; padding: 10px 20px; background: var(--bg-primary); color: var(--accent-blue); border: 1px solid var(--border); border-radius: 6px; text-decoration: none; transition: all 0.2s;">
                    Search on BTC Map ↗
                </a>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const merchantParam = urlParams.get('id');

        if (!merchantParam) {
            document.getElementById('merchant-name').textContent = 'Merchant Not Found';
            document.getElementById('merchant-subtitle').textContent = 'No merchant ID provided';
        } else {
            loadMerchantData(merchantParam);
        }

        function getPlatform(url) {
            if (url.includes('twitter.com') || url.includes('x.com')) {
                return { name: 'X', icon: '𝕏' };
            }
            return { name: 'Nostr', icon: '🟣' };
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const day = date.getDate();
            const month = date.toLocaleDateString('en-US', { month: 'short' });
            const year = date.getFullYear();
            return `${day} ${month} ${year}`;
        }

        function normalizeId(name) {
            return name
                .replace(/[^\w\s-]/g, '') // Remove emojis and special characters
                .trim()
                .toLowerCase()
                .replace(/\s+/g, '-'); // Replace spaces with hyphens
        }

        function getCountryName(flagEmoji) {
            const countryMap = {
                '🇿🇦': 'South Africa',
                '🇰🇪': 'Kenya',
                '🇳🇬': 'Nigeria',
                '🇬🇭': 'Ghana',
                '🇹🇿': 'Tanzania',
                '🇺🇬': 'Uganda',
                '🇿🇲': 'Zambia',
                '🇿🇼': 'Zimbabwe',
                '🇧🇼': 'Botswana',
                '🇲🇼': 'Malawi',
                '🇷🇼': 'Rwanda',
                '🇪🇹': 'Ethiopia',
                '🇨🇩': 'Democratic Republic of Congo',
                '🇨🇬': 'Republic of Congo',
                '🇧🇯': 'Benin',
                '🇹🇬': 'Togo',
                '🇨🇲': 'Cameroon',
                '🇸🇳': 'Senegal',
                '🇨🇮': 'Côte d\'Ivoire',
                '🇲🇱': 'Mali',
                '🇧🇫': 'Burkina Faso',
                '🇳🇪': 'Niger'
            };
            return countryMap[flagEmoji] || flagEmoji;
        }

        async function loadMerchantData(merchantName) {
            try {
                // Load tracker data (current epoch - has btcmap_link)
                const trackerResponse = await fetch('tracker-data.json');
                const trackerData = await trackerResponse.json();

                // Load historical stats (Epoch 4)
                const historicalResponse = await fetch('stats-epoch4.json');
                const historicalStats = await historicalResponse.json();

                // Normalize the URL parameter for comparison
                const normalizedParam = normalizeId(merchantName);

                // Find merchant in tracker submissions
                const merchantSubmissions = trackerData.submissions?.filter(s =>
                    normalizeId(s.merchant_name) === normalizedParam
                ) || [];

                // Convert tracker submissions to post format
                const currentPosts = merchantSubmissions.map(s => ({
                    url: s.post_url,
                    date: s.timestamp.split(' ')[0], // Extract date from "2026-04-12 05:08:45 UTC"
                    project: s.project_name,
                    btcmap_link: s.btcmap_link
                }));

                // Find merchant in historical stats
                const historicalMerchant = historicalStats.top_merchants?.find(m =>
                    normalizeId(m.name) === normalizedParam
                );

                // Combine posts from both epochs
                const allPosts = [
                    ...currentPosts,
                    ...(historicalMerchant?.posts || [])
                ].sort((a, b) => new Date(b.date) - new Date(a.date));

                const totalCount = allPosts.length;
                const merchantDisplayName = merchantSubmissions[0]?.merchant_name || historicalMerchant?.name || merchantName;
                const lightningAddress = merchantSubmissions[0]?.lightning_address || null;

                // Extract country from project name (gets flag emoji from end of project name)
                let countryInfo = '';
                let countryName = null;
                if (allPosts.length > 0 && allPosts[0].project) {
                    const flagMatch = allPosts[0].project.match(/[\u{1F1E6}-\u{1F1FF}][\u{1F1E6}-\u{1F1FF}]/u);
                    if (flagMatch) {
                        countryName = getCountryName(flagMatch[0]);
                        countryInfo = ` in ${countryName}`;
                    }
                }

                // Update page title and header
                document.getElementById('page-title').textContent = `${merchantDisplayName} | CBAF`;
                document.getElementById('merchant-name').textContent = merchantDisplayName;
                document.getElementById('merchant-subtitle').textContent = `Circular Economy Merchant${countryInfo}`;

                // Render stats
                renderStats(totalCount, allPosts, merchantDisplayName, lightningAddress, countryName);

                // Render posts
                renderPosts(allPosts);

                // Handle BTC Map section
                renderBtcMapSection(merchantDisplayName, allPosts);

                // Update footer timestamp
                if (trackerData && trackerData.last_updated) {
                    document.getElementById('updated').textContent = new Date(trackerData.last_updated).toLocaleString();
                }

            } catch (error) {
                console.error('Error loading merchant data:', error);
                document.getElementById('merchant-name').textContent = 'Error Loading Data';
                document.getElementById('merchant-subtitle').textContent = 'Please try again later';
            }
        }

        function renderStats(totalCount, posts, merchantName, lightningAddress, countryName) {
            const statsGrid = document.getElementById('stats-grid');

            // Calculate first and last post dates
            const dates = posts.map(p => new Date(p.date)).sort((a, b) => a - b);
            const firstPost = dates.length > 0 ? dates[0] : null;
            const lastPost = dates.length > 0 ? dates[dates.length - 1] : null;

            // Support Card
            let supportCardHTML = '';
            if (lightningAddress) {
                supportCardHTML = `
                    <div class="support-card">
                        <h2>Support ${escapeHtml(merchantName)}</h2>
                        <p>Lightning Network</p>
                        <div class="qr-container" id="qr-lightning"></div>
                        <div class="address" id="lightning-address" onclick="copyAddressWithFeedback('${escapeHtml(lightningAddress)}', 'lightning-address')" title="Click to copy">${escapeHtml(lightningAddress)}</div>
                    </div>
                `;
            } else {
                supportCardHTML = `
                    <div class="support-card">
                        <h2>Support ${escapeHtml(merchantName)}</h2>
                        <p style="text-align: center; color: var(--text-secondary); margin-top: 20px;">Lightning address not available</p>
                    </div>
                `;
            }

            // Overview Card
            const overviewCardHTML = `
                <div class="overview-card">
                    <h2>PoWBoT Overview</h2>
                    <div class="big-number">${totalCount}<span class="unit"> ${totalCount === 1 ? 'post' : 'posts'}</span></div>
                    <div style="margin-top: 15px;">
                        ${countryName ? `
                        <div class="stat-row">
                            <span class="stat-label">Location</span>
                            <span class="stat-value" style="color: var(--accent-orange);">${escapeHtml(countryName)}</span>
                        </div>
                        ` : ''}
                        ${firstPost ? `
                        <div class="stat-row">
                            <span class="stat-label">First Post</span>
                            <span class="stat-value" style="color: var(--accent-orange);">${formatDate(firstPost)}</span>
                        </div>
                        ` : ''}
                        ${lastPost ? `
                        <div class="stat-row">
                            <span class="stat-label">Latest Post</span>
                            <span class="stat-value" style="color: var(--accent-orange);">${formatDate(lastPost)}</span>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;

            statsGrid.innerHTML = supportCardHTML + overviewCardHTML;

            // Generate QR code if lightning address exists
            if (lightningAddress) {
                setTimeout(() => {
                    const canvas = document.createElement('canvas');
                    QRCode.toCanvas(
                        canvas,
                        `lightning:${lightningAddress}`,
                        { width: 200, margin: 1 },
                        (error) => {
                            if (error) {
                                console.error('QR generation failed:', error);
                            } else {
                                document.getElementById('qr-lightning').appendChild(canvas);
                            }
                        }
                    );
                }, 100);
            }
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function copyAddressWithFeedback(address, elementId) {
            const addressElement = document.getElementById(elementId);
            const originalText = addressElement.textContent;

            navigator.clipboard.writeText(address).then(() => {
                // Add copied class for visual feedback
                addressElement.classList.add('copied');
                addressElement.textContent = 'Copied to clipboard!';

                // Reset after 2 seconds
                setTimeout(() => {
                    addressElement.classList.remove('copied');
                    addressElement.textContent = originalText;
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
                alert('Failed to copy address');
            });
        }

        function renderPosts(allPosts) {
            const postsContainer = document.getElementById('posts-list');
            const initialCount = 5;

            if (allPosts.length === 0) {
                postsContainer.innerHTML = '<div class="empty-state">No posts found</div>';
                return;
            }

            let html = '';
            allPosts.forEach((post, index) => {
                const platform = getPlatform(post.url);
                const isHidden = index >= initialCount;
                html += `
                    <a href="${post.url}" target="_blank" rel="noopener" class="post-item ${isHidden ? 'post-hidden' : ''}" data-index="${index}">
                        <span class="post-info">
                            <span class="post-platform">${platform.name}</span>
                            <span class="post-project">${post.project || 'Unknown Project'}</span>
                        </span>
                        <span class="post-date">${formatDate(post.date)}</span>
                    </a>
                `;
            });

            if (allPosts.length > initialCount) {
                html += `
                    <button class="show-more-button" onclick="toggleShowMore(this, ${allPosts.length})">
                        Show ${allPosts.length - initialCount} more
                    </button>
                `;
            }

            postsContainer.innerHTML = html;
        }

        function toggleShowMore(button, totalCount) {
            const posts = document.querySelectorAll('.post-item');
            const hiddenPosts = document.querySelectorAll('.post-hidden');
            const initialCount = 5;

            if (hiddenPosts.length > 0) {
                // Show all
                hiddenPosts.forEach(post => post.classList.remove('post-hidden'));
                button.textContent = 'Show less';
            } else {
                // Hide extra posts
                posts.forEach((post, index) => {
                    if (index >= initialCount) {
                        post.classList.add('post-hidden');
                    }
                });
                button.textContent = `Show ${totalCount - initialCount} more`;
            }
        }

        function renderBtcMapSection(merchantName, posts) {
            const section = document.getElementById('btcmap-section');
            const embedContainer = document.getElementById('btcmap-container');
            const fallbackContainer = document.getElementById('btcmap-fallback');
            const embed = document.getElementById('btcmap-embed');
            const link = document.getElementById('btcmap-link');
            const searchLink = document.getElementById('btcmap-search-link');

            // If no posts, don't show the section
            if (!posts || posts.length === 0) {
                section.style.display = 'none';
                return;
            }

            // Show the section
            section.style.display = 'block';

            // Look for btcmap_link in the posts (available for current epoch submissions)
            const postWithBtcMap = posts.find(p => p.btcmap_link);

            if (postWithBtcMap && postWithBtcMap.btcmap_link) {
                // Use the btcmap_link directly from the submission data
                const btcmapUrl = postWithBtcMap.btcmap_link;

                console.log('Using BTC Map link from submission:', btcmapUrl);

                embed.src = btcmapUrl;
                link.href = btcmapUrl;
                embedContainer.style.display = 'block';
                fallbackContainer.style.display = 'none';
            } else {
                // No btcmap_link found (historical data) - show search fallback
                const searchUrl = `https://btcmap.org/?search=${encodeURIComponent(merchantName)}`;
                searchLink.href = searchUrl;
                embedContainer.style.display = 'none';
                fallbackContainer.style.display = 'block';
            }
        }
    </script>

    <!-- Footer (loaded from includes/footer.html) -->
    <div id="site-footer"></div>

    <!-- Shared nav/footer injection -->
    <script src="includes/inject.js"></script>
</body>
</html>
