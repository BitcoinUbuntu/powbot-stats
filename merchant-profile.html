<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Merchant Profile | CBAF</title>
    <link rel="icon" type="image/png" sizes="32x32" href="images/stats_emoji_32px.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/stats_emoji_16px.png">
    <link rel="apple-touch-icon" sizes="180x180" href="images/stats_emoji_180px.png">

    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #21262d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-orange: #f7931a;
            --accent-green: #3fb950;
            --accent-blue: #58a6ff;
            --accent-purple: #a371f7;
            --border: #30363d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Navigation */
        nav {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;
            position: sticky;
            top: 0;
            margin: -20px -20px 20px -20px;
            z-index: 100;
        }

        nav .container {
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        nav a {
            color: var(--accent-blue);
            text-decoration: none;
            font-size: 0.9rem;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
            border-radius: 12px;
            padding: 40px 30px;
            margin-bottom: 24px;
            text-align: center;
        }

        .merchant-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            background: var(--bg-secondary);
            border: 4px solid var(--bg-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }

        .merchant-name {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--accent-green);
        }

        .merchant-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Stats Section */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-green);
        }

        /* Activity Section */
        .section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .section h2 {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        .posts-list {
            display: flex;
            flex-direction: column;
        }

        .post-item {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 10px 12px;
            margin-top: 8px;
            background: var(--bg-primary);
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
            transition: background 0.2s ease;
            color: inherit;
        }

        .post-item:hover {
            background: var(--bg-card);
        }

        .post-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .post-platform {
            color: var(--accent-blue);
            font-weight: 600;
        }

        .post-project {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .post-date {
            color: var(--text-secondary);
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        .post-hidden {
            display: none;
        }

        .show-more-button {
            margin-top: 12px;
            padding: 10px 16px;
            background: var(--bg-primary);
            color: var(--accent-blue);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            width: 100%;
        }

        .show-more-button:hover {
            background: var(--bg-secondary);
            border-color: var(--accent-blue);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            nav .container {
                justify-content: center;
            }

            .hero {
                padding: 30px 20px;
            }

            .merchant-name {
                font-size: 1.5rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <div class="nav-links">
                <a href="index.html">Stats</a>
                <span style="color: var(--text-secondary);">|</span>
                <a href="members.html">Directory</a>
                <span style="color: var(--text-secondary);">|</span>
                <a href="archive.html">Archive</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="hero">
            <div class="merchant-icon">🏪</div>
            <h1 class="merchant-name" id="merchant-name">Loading...</h1>
            <p class="merchant-subtitle" id="merchant-subtitle">Merchant Profile</p>
        </div>

        <div class="stats-grid" id="stats-grid">
            <!-- Stats will be inserted here -->
        </div>

        <div class="section">
            <h2>PoWBoT Activity</h2>
            <div class="posts-list" id="posts-list">
                <!-- Posts will be inserted here -->
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const merchantParam = urlParams.get('id');

        if (!merchantParam) {
            document.getElementById('merchant-name').textContent = 'Merchant Not Found';
            document.getElementById('merchant-subtitle').textContent = 'No merchant ID provided';
        } else {
            loadMerchantData(merchantParam);
        }

        function getPlatform(url) {
            if (url.includes('twitter.com') || url.includes('x.com')) {
                return { name: 'X', icon: '𝕏' };
            }
            return { name: 'Nostr', icon: '🟣' };
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const day = date.getDate();
            const month = date.toLocaleDateString('en-US', { month: 'short' });
            const year = date.getFullYear();
            return `${day} ${month} ${year}`;
        }

        function normalizeId(name) {
            return name
                .replace(/[^\w\s-]/g, '') // Remove emojis and special characters
                .trim()
                .toLowerCase()
                .replace(/\s+/g, '-'); // Replace spaces with hyphens
        }

        function getCountryName(flagEmoji) {
            const countryMap = {
                '🇿🇦': 'South Africa',
                '🇰🇪': 'Kenya',
                '🇳🇬': 'Nigeria',
                '🇬🇭': 'Ghana',
                '🇹🇿': 'Tanzania',
                '🇺🇬': 'Uganda',
                '🇿🇲': 'Zambia',
                '🇿🇼': 'Zimbabwe',
                '🇧🇼': 'Botswana',
                '🇲🇼': 'Malawi',
                '🇷🇼': 'Rwanda',
                '🇪🇹': 'Ethiopia',
                '🇨🇩': 'Democratic Republic of Congo',
                '🇨🇬': 'Republic of Congo',
                '🇧🇯': 'Benin',
                '🇹🇬': 'Togo',
                '🇨🇲': 'Cameroon',
                '🇸🇳': 'Senegal',
                '🇨🇮': 'Côte d\'Ivoire',
                '🇲🇱': 'Mali',
                '🇧🇫': 'Burkina Faso',
                '🇳🇪': 'Niger'
            };
            return countryMap[flagEmoji] || flagEmoji;
        }

        async function loadMerchantData(merchantName) {
            try {
                // Load current epoch stats
                const currentResponse = await fetch('stats.json');
                const currentStats = await currentResponse.json();

                // Load historical stats (Epoch 4)
                const historicalResponse = await fetch('stats-epoch4.json');
                const historicalStats = await historicalResponse.json();

                // Normalize the URL parameter for comparison
                const normalizedParam = normalizeId(merchantName);

                // Find merchant in current stats
                const currentMerchant = currentStats.top_merchants?.find(m =>
                    normalizeId(m.name) === normalizedParam
                );

                // Find merchant in historical stats
                const historicalMerchant = historicalStats.top_merchants?.find(m =>
                    normalizeId(m.name) === normalizedParam
                );

                // Combine posts from both epochs
                const allPosts = [
                    ...(currentMerchant?.posts || []),
                    ...(historicalMerchant?.posts || [])
                ].sort((a, b) => new Date(b.date) - new Date(a.date));

                const totalCount = allPosts.length;
                const merchantDisplayName = currentMerchant?.name || historicalMerchant?.name || merchantName;

                // Extract country from project name (gets flag emoji from end of project name)
                let countryInfo = '';
                if (allPosts.length > 0 && allPosts[0].project) {
                    const flagMatch = allPosts[0].project.match(/[\u{1F1E6}-\u{1F1FF}][\u{1F1E6}-\u{1F1FF}]/u);
                    if (flagMatch) {
                        const countryName = getCountryName(flagMatch[0]);
                        countryInfo = ` in ${countryName}`;
                    }
                }

                // Update page title and header
                document.getElementById('page-title').textContent = `${merchantDisplayName} | CBAF`;
                document.getElementById('merchant-name').textContent = merchantDisplayName;
                document.getElementById('merchant-subtitle').textContent = `Circular Economy Merchant${countryInfo}`;

                // Render stats
                renderStats(totalCount, allPosts);

                // Render posts
                renderPosts(allPosts);

            } catch (error) {
                console.error('Error loading merchant data:', error);
                document.getElementById('merchant-name').textContent = 'Error Loading Data';
                document.getElementById('merchant-subtitle').textContent = 'Please try again later';
            }
        }

        function renderStats(totalCount, posts) {
            const statsGrid = document.getElementById('stats-grid');

            // Calculate first and last post dates
            const dates = posts.map(p => new Date(p.date)).sort((a, b) => a - b);
            const firstPost = dates.length > 0 ? dates[0] : null;
            const lastPost = dates.length > 0 ? dates[dates.length - 1] : null;

            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">Total Posts</div>
                    <div class="stat-value">${totalCount}</div>
                </div>
                ${firstPost ? `
                <div class="stat-card">
                    <div class="stat-label">First Post</div>
                    <div class="stat-value" style="font-size: 1.2rem;">${formatDate(firstPost)}</div>
                </div>
                ` : ''}
                ${lastPost ? `
                <div class="stat-card">
                    <div class="stat-label">Latest Post</div>
                    <div class="stat-value" style="font-size: 1.2rem;">${formatDate(lastPost)}</div>
                </div>
                ` : ''}
            `;
        }

        function renderPosts(allPosts) {
            const postsContainer = document.getElementById('posts-list');
            const initialCount = 10;

            if (allPosts.length === 0) {
                postsContainer.innerHTML = '<div class="empty-state">No posts found</div>';
                return;
            }

            let html = '';
            allPosts.forEach((post, index) => {
                const platform = getPlatform(post.url);
                const isHidden = index >= initialCount;
                html += `
                    <a href="${post.url}" target="_blank" rel="noopener" class="post-item ${isHidden ? 'post-hidden' : ''}" data-index="${index}">
                        <span class="post-info">
                            <span class="post-platform">${platform.name}</span>
                            <span class="post-project">${post.project || 'Unknown Project'}</span>
                        </span>
                        <span class="post-date">${formatDate(post.date)}</span>
                    </a>
                `;
            });

            if (allPosts.length > initialCount) {
                html += `
                    <button class="show-more-button" onclick="toggleShowMore(this, ${allPosts.length})">
                        Show ${allPosts.length - initialCount} more
                    </button>
                `;
            }

            postsContainer.innerHTML = html;
        }

        function toggleShowMore(button, totalCount) {
            const posts = document.querySelectorAll('.post-item');
            const hiddenPosts = document.querySelectorAll('.post-hidden');
            const initialCount = 10;

            if (hiddenPosts.length > 0) {
                // Show all
                hiddenPosts.forEach(post => post.classList.remove('post-hidden'));
                button.textContent = 'Show less';
            } else {
                // Hide extra posts
                posts.forEach((post, index) => {
                    if (index >= initialCount) {
                        post.classList.add('post-hidden');
                    }
                });
                button.textContent = `Show ${totalCount - initialCount} more`;
            }
        }
    </script>
</body>
</html>
