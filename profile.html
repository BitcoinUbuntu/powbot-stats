<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Project Profile | CBAF</title>
    <link rel="icon" type="image/png" sizes="32x32" href="images/stats_emoji_32px.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/stats_emoji_16px.png">
    <link rel="apple-touch-icon" sizes="180x180" href="images/stats_emoji_180px.png">

    <script src="qrcode.min.js"></script>

    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #21262d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-orange: #f7931a;
            --accent-green: #3fb950;
            --accent-blue: #58a6ff;
            --accent-purple: #a371f7;
            --border: #30363d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Navigation */
        nav {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;
            position: sticky;
            top: 0;
            margin: -20px -20px 20px -20px;
            z-index: 100;
        }

        nav .container {
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        nav a {
            color: var(--accent-blue);
            text-decoration: none;
            font-size: 0.9rem;
        }

        nav a:hover {
            text-decoration: underline;
        }

        nav a.current {
            color: var(--accent-orange);
            font-weight: 600;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        /* Hero Section */
        .hero {
            position: relative;
            min-height: 250px;
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
            margin: -20px -20px 20px -20px;
        }

        .hero-overlay {
            padding: 40px 20px 20px;
        }

        .hero-content {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            align-items: flex-end;
            gap: 24px;
        }

        .hero-logo {
            width: 120px;
            height: 120px;
            border-radius: 16px;
            object-fit: cover;
            border: 4px solid var(--bg-primary);
            background: var(--bg-secondary);
        }

        .hero-logo-placeholder {
            width: 120px;
            height: 120px;
            border-radius: 16px;
            background: var(--bg-secondary);
            border: 4px solid var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .hero-text {
            flex: 1;
            padding-bottom: 8px;
        }

        .hero-text h1 {
            font-size: 2rem;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hero-text .flag {
            font-size: 2rem;
        }

        .hero-text .tagline {
            color: var(--accent-orange);
            font-size: 1rem;
            margin-bottom: 8px;
        }

        .hero-text .location {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .hero-links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding-top: 20px;
            padding-bottom: 20px;
        }

        .hero-link {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 12px;
            color: var(--accent-blue);
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .hero-link:hover {
            border-color: var(--accent-blue);
            background: rgba(88, 166, 255, 0.1);
        }

        /* Content */
        .content {
            padding: 30px 20px 0 20px;
        }

        .section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .section h2 {
            font-size: 1.3rem;
            margin-bottom: 16px;
            color: var(--accent-blue);
        }

        .section h3 {
            font-size: 1.1rem;
            margin-top: 20px;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .section p, .section li {
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .section strong {
            color: var(--text-primary);
        }

        /* Donate Section */
        .donate-section {
            background: linear-gradient(135deg, rgba(247, 147, 26, 0.15), rgba(247, 147, 26, 0.05));
            border: 2px solid var(--accent-orange);
        }

        .donate-section h2 {
            color: var(--accent-orange);
        }

        .donate-methods {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .donate-method {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }

        .donate-method h3 {
            font-size: 1rem;
            margin: 0 0 12px 0;
        }

        /* Two Column Layout */
        .top-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
            align-items: stretch;
        }

        .top-cards > .section {
            height: 100%;
        }

        .top-cards > .support-card {
            height: 100%;
        }

        @media (max-width: 768px) {
            .top-cards {
                grid-template-columns: 1fr;
                gap: 0;
                margin-bottom: 0;
            }

            .top-cards > .section {
                height: auto;
                margin-bottom: 20px;
            }

            .top-cards > .support-card {
                height: auto;
                margin-bottom: 20px;
            }
        }

        /* Support Card with Flip */
        .support-card {
            perspective: 1000px;
        }

        .support-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .support-card.flipped .support-card-inner {
            transform: rotateY(180deg);
        }

        .support-front,
        .support-back {
            width: 100%;
            min-height: 100%;
            backface-visibility: hidden;
            background: var(--bg-card);
            border: 1px solid var(--accent-orange);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
        }

        .support-front {
            position: relative;
        }

        .support-back {
            position: absolute;
            top: 0;
            left: 0;
        }

        .support-front h2,
        .support-back h2 {
            color: var(--accent-orange);
            font-size: 1.3rem;
            margin: 0;
            text-align: center;
        }

        .support-front p,
        .support-back p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin: 0;
            text-align: center;
        }

        .support-back {
            transform: rotateY(180deg);
        }

        .support-front .qr-container,
        .support-back .qr-container {
            background: white;
            padding: 10px;
            border-radius: 8px;
            display: inline-block;
        }

        .support-front .qr-container canvas,
        .support-back .qr-container canvas {
            display: block;
        }


        #qr-lightning, #qr-onchain {
            margin: 8px auto;
            padding: 8px;
            background: white;
            border-radius: 8px;
            display: inline-block;
        }

        #qr-lightning canvas,
        #qr-onchain canvas {
            display: block;
        }

        .address {
            font-family: monospace;
            font-size: 0.8rem;
            word-break: break-all;
            color: var(--text-secondary);
            background: var(--bg-primary);
            padding: 8px;
            border-radius: 6px;
            margin-top: 6px;
        }

        .support-front .address,
        .support-back .address {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            background: var(--bg-secondary);
            padding: 6px 10px;
            border-radius: 6px;
            word-break: break-all;
            text-align: center;
            max-width: 100%;
            margin: 0;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .support-front .address:hover,
        .support-back .address:hover {
            background: rgba(88, 166, 255, 0.1);
            border-color: var(--accent-blue);
        }

        .support-front .address.copied,
        .support-back .address.copied {
            background: rgba(63, 185, 80, 0.2);
            color: var(--accent-green);
            border-color: var(--accent-green);
        }

        .support-actions {
            display: flex;
            gap: 8px;
            width: 100%;
            margin-top: auto;
        }

        .support-actions .btn-back {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .support-actions .btn-back:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .copy-btn {
            background: var(--accent-orange);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            margin-top: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .copy-btn:hover {
            background: #e08416;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .stat-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }

        .stat-box .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-purple);
        }

        .stat-box .label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Activity Charts */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }

        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 20px 32px 20px;
        }

        .chart-card h3 {
            font-size: 1rem;
            margin: 0 0 16px 0;
            color: var(--text-primary);
        }

        /* Heatmap */
        .heatmap-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .heatmap-months {
            display: flex;
            gap: 4px;
            margin-bottom: 8px;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .heatmap-month {
            flex: 1;
            text-align: center;
        }

        .heatmap-grid {
            display: grid;
            grid-template-rows: repeat(7, 1fr);
            grid-auto-flow: column;
            gap: 3px;
        }

        .heatmap-day {
            width: 16px;
            height: 16px;
            border-radius: 2px;
            background: var(--bg-secondary);
            cursor: pointer;
            position: relative;
        }

        .heatmap-day.level-0 { background: var(--bg-secondary); }
        .heatmap-day.level-1 { background: rgba(163, 113, 247, 0.3); }
        .heatmap-day.level-2 { background: rgba(163, 113, 247, 0.5); }
        .heatmap-day.level-3 { background: rgba(163, 113, 247, 0.7); }
        .heatmap-day.level-4 { background: rgba(163, 113, 247, 1); }

        .heatmap-day:hover::after {
            content: attr(data-date) ': ' attr(data-count) ' posts';
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            white-space: nowrap;
            z-index: 10;
            border: 1px solid var(--border);
        }

        /* Timeline */
        .timeline-container {
            position: relative;
            width: 100%;
            height: 120px;
        }

        .timeline-svg {
            width: 100%;
            height: 100%;
        }

        .timeline-line {
            fill: none;
            stroke: var(--accent-purple);
            stroke-width: 2;
        }

        .timeline-area {
            fill: var(--accent-purple);
            opacity: 0.15;
        }

        .timeline-dot {
            fill: var(--accent-purple);
            cursor: pointer;
        }

        .timeline-dot:hover {
            r: 4;
        }

        .timeline-axis {
            stroke: var(--border);
            stroke-width: 1;
        }

        .timeline-label {
            font-size: 0.7rem;
            fill: var(--text-secondary);
        }

        /* Badges */
        .badges-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .badges-section h2 {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        .badges-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
        }

        .badge:hover {
            transform: translateY(-2px);
            border-color: var(--accent-purple);
        }

        .badge-tooltip {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            white-space: nowrap;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .badge-tooltip.show {
            opacity: 1;
        }

        .badge-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: var(--border);
        }

        .badge-icon {
            font-size: 1.1rem;
            line-height: 1;
        }

        .badge-label {
            color: var(--text-primary);
        }

        /* Badge color variations */
        .badge.activity { border-color: var(--accent-blue); }
        .badge.activity:hover { border-color: var(--accent-blue); background: rgba(88, 166, 255, 0.1); }

        .badge.community { border-color: var(--accent-green); }
        .badge.community:hover { border-color: var(--accent-green); background: rgba(63, 185, 80, 0.1); }

        .badge.consistency { border-color: var(--accent-purple); }
        .badge.consistency:hover { border-color: var(--accent-purple); background: rgba(163, 113, 247, 0.1); }

        .badge.legacy { border-color: var(--accent-orange); }
        .badge.legacy:hover { border-color: var(--accent-orange); background: rgba(247, 147, 26, 0.1); }

        .badge.excellence { border-color: #ffd700; }
        .badge.excellence:hover { border-color: #ffd700; background: rgba(255, 215, 0, 0.1); }

        /* Recent Posts */
        .posts-list {
            display: flex;
            flex-direction: column;
            margin-top: 16px;
        }

        .post-item {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 10px 12px;
            margin-top: 8px;
            background: var(--bg-primary);
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
            transition: background 0.2s ease;
            color: inherit;
        }

        .post-item:hover {
            background: var(--bg-card);
        }

        .post-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .post-platform {
            color: var(--accent-blue);
            font-weight: 600;
        }

        .post-merchant {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .post-date {
            color: var(--text-secondary);
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        .post-hidden {
            display: none !important;
        }

        .posts-more {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            background: var(--bg-secondary);
            border: 1px dashed var(--border);
            border-radius: 8px;
            color: var(--accent-blue);
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        @media (hover: hover) {
            .posts-more:hover {
                background: var(--bg-card);
                border-color: var(--accent-blue);
            }
        }

        /* Gallery */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .gallery img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        /* Contact Links */
        .contact-links {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
        }

        .contact-link {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 16px;
            color: var(--accent-blue);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .contact-link:hover {
            border-color: var(--accent-blue);
            background: rgba(88, 166, 255, 0.1);
        }

        /* Loading & Error */
        .loading, .error {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .error {
            color: #f85149;
        }

        @media (max-width: 768px) {
            nav .container {
                justify-content: center;
            }

            .hero-content {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .hero-text h1 {
                justify-content: center;
            }

            .hero-links {
                justify-content: center;
            }

            .donate-methods {
                grid-template-columns: 1fr;
            }
        }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        footer a {
            color: var(--accent-blue);
        }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <div class="nav-links">
                <a href="index.html">Stats</a>
                <span style="color: var(--text-secondary);">|</span>
                <a href="members.html">Directory</a>
                <span style="color: var(--text-secondary);">|</span>
                <a href="archive.html">Archive</a>
            </div>
        </div>
    </nav>

    <div id="profile-content">
        <div class="loading">Loading profile...</div>
    </div>

    <footer>
        <p>Made possible thanks to <a href="https://www.bitcoinbeach.com/" target="_blank">Bitcoin Beach</a> & the <a href="https://fbce.io/" target="_blank">FBCE</a> 🧡 Built by Lab21 | Powered by <a href="https://blink.sv" target="_blank">Blink</a> | Data updated: <span id="updated">--</span> CAT | <a href="about.html">About</a> | <a href="disclaimer.html">Disclaimer</a></p>
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const memberId = urlParams.get('id');

        if (!memberId) {
            document.getElementById('profile-content').innerHTML = `
                <div class="error">
                    <h2>Invalid Profile</h2>
                    <p>No project ID specified. <a href="members.html" style="color: var(--accent-blue);">Return to directory</a></p>
                </div>
            `;
        } else {
            loadProfile();
        }

        async function loadProfile() {
            try {
                // Load member data and stats in parallel
                const [membersData, statsEpoch4, statsLive, statsHistorical] = await Promise.all([
                    fetch('members.json').then(r => r.json()),
                    fetch('stats-epoch4.json?t=' + Date.now()).then(r => r.json()).catch(() => null),
                    fetch('stats.json?t=' + Date.now()).then(r => r.json()).catch(() => null),
                    fetch('stats-historical.json?t=' + Date.now()).then(r => r.json()).catch(() => null)
                ]);

                const member = membersData.members.find(m => m.id === memberId);
                if (!member) {
                    throw new Error('Member not found');
                }

                // Combine stats from all epochs
                const allStats = {
                    epoch4: statsEpoch4,
                    live: statsLive,
                    historical: statsHistorical
                };

                // Update timestamp (use live stats if available, otherwise epoch4)
                const statsForTimestamp = statsLive || statsEpoch4;
                if (statsForTimestamp && statsForTimestamp.generated_at) {
                    document.getElementById('updated').textContent = new Date(statsForTimestamp.generated_at).toLocaleString();
                }

                renderProfile(member, allStats);
            } catch (err) {
                document.getElementById('profile-content').innerHTML = `
                    <div class="error">
                        <h2>Error Loading Profile</h2>
                        <p>${err.message}. <a href="members.html" style="color: var(--accent-blue);">Return to directory</a></p>
                    </div>
                `;
            }
        }

        function renderProfile(member, allStats) {
            document.getElementById('page-title').textContent = `${member.name} | CBAF`;

            const logoHtml = member.logo_url ?
                `<img src="${member.logo_url}" alt="${member.name}" class="hero-logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                 <div class="hero-logo-placeholder" style="display:none;">${member.flag || member.name.charAt(0)}</div>`
                :

        function renderHeatmap(elementId, posts) {
            const container = document.getElementById(elementId);
            if (!container || posts.length === 0) return;

            // Epoch 4 Live ran from January 13 to March 4, 2026
            const startDate = new Date('2026-01-13');
            const endDate = new Date('2026-03-04');

            // Count posts per day
            const postsByDay = {};
            posts.forEach(post => {
                const dateKey = post.date.split('T')[0]; // YYYY-MM-DD
                postsByDay[dateKey] = (postsByDay[dateKey] || 0) + 1;
            });

            // Get max count for color scaling
            const maxCount = Math.max(...Object.values(postsByDay));

            // Align grid to Sunday before Jan 13 for proper weekday rows
            const gridStartDate = new Date(startDate);
            gridStartDate.setDate(gridStartDate.getDate() - gridStartDate.getDay());

            let html = '<div class="heatmap-container"><div class="heatmap-grid">';

            const currentDate = new Date(gridStartDate);

            while (currentDate <= endDate) {
                const dateKey = currentDate.toISOString().split('T')[0];
                const count = postsByDay[dateKey] || 0;
                const isBeforeEpoch = currentDate < startDate;

                // Determine color level (0-4)
                let level = 0;
                if (count > 0) {
                    if (maxCount <= 4) {
                        level = count;
                    } else {
                        level = Math.min(4, Math.ceil((count / maxCount) * 4));
                    }
                }

                const formattedDate = currentDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

                // Make days before epoch start invisible
                if (isBeforeEpoch) {
                    html += `<div class="heatmap-day" style="opacity: 0; pointer-events: none;"></div>`;
                } else {
                    html += `<div class="heatmap-day level-${level}" data-date="${formattedDate}" data-count="${count}"></div>`;
                }

                currentDate.setDate(currentDate.getDate() + 1);
            }

            html += '</div></div>';
            container.innerHTML = html;
        }

        function renderTimeline(elementId, posts) {
            const container = document.getElementById(elementId);
            if (!container || posts.length === 0) return;

            // Epoch 4 Live date range
            const startDate = new Date('2026-01-13');
            const endDate = new Date('2026-03-04');

            // Count posts by day
            const postsByDay = {};
            posts.forEach(post => {
                const dateKey = post.date.split('T')[0];
                postsByDay[dateKey] = (postsByDay[dateKey] || 0) + 1;
            });

            // Create daily data points for entire range
            const dataPoints = [];
            const currentDate = new Date(startDate);
            while (currentDate <= endDate) {
                const dateKey = currentDate.toISOString().split('T')[0];
                dataPoints.push({
                    date: new Date(currentDate),
                    count: postsByDay[dateKey] || 0
                });
                currentDate.setDate(currentDate.getDate() + 1);
            }

            // Get max count for scaling
            const maxCount = Math.max(...dataPoints.map(d => d.count), 1);

            // SVG dimensions
            const width = 100; // percentage
            const height = 100;
            const padding = { top: 10, right: 5, bottom: 5, left: 5 };
            const chartWidth = 100 - padding.left - padding.right;
            const chartHeight = 100 - padding.top - padding.bottom;

            // Generate line path
            const points = dataPoints.map((d, i) => {
                const x = padding.left + (i / (dataPoints.length - 1)) * chartWidth;
                const y = padding.top + chartHeight - (d.count / maxCount) * chartHeight;
                return { x, y, count: d.count };
            });

            const linePath = points.map((p, i) =>
                `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`
            ).join(' ');

            // Area path (for fill under line)
            const areaPath = `M ${padding.left} ${padding.top + chartHeight} ` +
                points.map(p => `L ${p.x} ${p.y}`).join(' ') +
                ` L ${padding.left + chartWidth} ${padding.top + chartHeight} Z`;

            // Format dates for labels
            const startLabel = startDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            const endLabel = endDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

            // Render SVG
            container.innerHTML = `
                <div class="timeline-container">
                    <svg viewBox="0 0 100 100" preserveAspectRatio="none" class="timeline-svg">
                        <path class="timeline-area" d="${areaPath}" />
                        <path class="timeline-line" d="${linePath}" vector-effect="non-scaling-stroke" />
                    </svg>
                    <div style="display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--text-secondary); margin-top: 4px;">
                        <span>${startLabel}</span>
                        <span>${endLabel}</span>
                    </div>
                </div>
            `;
        }

        function calculateBadges(epoch4Posts, epoch5Posts, historicalPosts, allStats, statsName) {
            const badges = [];

            // Total posts across all epochs
            const totalPosts = epoch4Posts.length + epoch5Posts.length + historicalPosts.length;

            // Activity Milestones
            if (totalPosts >= 500) {
                badges.push({ icon: '💎', label: 'Diamond Status', type: 'activity', title: '500+ posts' });
            } else if (totalPosts >= 100) {
                badges.push({ icon: '⭐', label: 'Rising Star', type: 'activity', title: '100+ posts' });
            } else if (totalPosts >= 50) {
                badges.push({ icon: '🔥', label: 'On Fire', type: 'activity', title: '50+ posts' });
            } else if (totalPosts >= 10) {
                badges.push({ icon: '🌱', label: 'First Steps', type: 'activity', title: '10+ posts' });
            }

            // Community Impact - based on unique merchants in Epoch 4
            if (epoch4Posts.length > 0) {
                const uniqueMerchants = new Set(epoch4Posts.map(p => p.merchant)).size;

                if (uniqueMerchants >= 25) {
                    badges.push({ icon: '🌍', label: 'Network Connector', type: 'community', title: '25+ unique merchants' });
                } else if (uniqueMerchants >= 15) {
                    badges.push({ icon: '🏪', label: 'Merchant Champion', type: 'community', title: '15+ unique merchants' });
                } else if (uniqueMerchants >= 5) {
                    badges.push({ icon: '🤝', label: 'Community Builder', type: 'community', title: '5+ unique merchants' });
                }
            }

            // Platform Diversity - active on both X and Nostr
            const allPosts = [...epoch4Posts, ...epoch5Posts];
            if (allPosts.length > 0) {
                const hasXPosts = allPosts.some(p => {
                    const url = p.url ? p.url.toLowerCase() : '';
                    return url.includes('twitter.com') || url.includes('x.com');
                });
                const hasNostrPosts = allPosts.some(p => {
                    const url = p.url ? p.url.toLowerCase() : '';
                    return url.includes('primal.net') || url.includes('njump') || (!url.includes('twitter.com') && !url.includes('x.com'));
                });

                if (hasXPosts && hasNostrPosts) {
                    badges.push({ icon: '🎯', label: 'All-Rounder', type: 'consistency', title: 'Active on X and Nostr' });
                }
            }

            // Daily Posting Streaks - calculate best streak across all epochs
            const calculateStreak = (posts) => {
                if (posts.length === 0) return 0;

                const dates = posts.map(p => p.date.split('T')[0]).sort();
                const uniqueDates = [...new Set(dates)];

                let maxStreak = 1;
                let currentStreak = 1;

                for (let i = 1; i < uniqueDates.length; i++) {
                    const prevDate = new Date(uniqueDates[i - 1]);
                    const currDate = new Date(uniqueDates[i]);
                    const dayDiff = Math.floor((currDate - prevDate) / (1000 * 60 * 60 * 24));

                    if (dayDiff === 1) {
                        currentStreak++;
                        maxStreak = Math.max(maxStreak, currentStreak);
                    } else {
                        currentStreak = 1;
                    }
                }

                return maxStreak;
            };

            // Calculate best streak from each epoch
            const epoch4Streak = calculateStreak(epoch4Posts);
            const epoch5Streak = calculateStreak(epoch5Posts);
            const bestStreak = Math.max(epoch4Streak, epoch5Streak);

            // Award streak badges based on best achievement
            if (bestStreak >= 21) {
                badges.push({ icon: '💪', label: '21-Day Streak', type: 'activity', title: 'Posted for 21+ consecutive days' });
            } else if (bestStreak >= 14) {
                badges.push({ icon: '⚡', label: '14-Day Streak', type: 'activity', title: 'Posted for 14+ consecutive days' });
            } else if (bestStreak >= 7) {
                badges.push({ icon: '🔥', label: '7-Day Streak', type: 'activity', title: 'Posted for 7+ consecutive days' });
            }

            // Legacy & Tenure
            if (historicalPosts.length > 0) {
                // Get unique epoch names
                const epochNames = new Set(historicalPosts.map(p => p.epoch));
                const historicalEpochs = epochNames.size;

                // Founding Member - participated in Epoch 1 (May 2025, the very first)
                if (epochNames.has('Epoch 1')) {
                    badges.push({ icon: '👑', label: 'Founding Member', type: 'excellence', title: 'Participated in Epoch 1' });
                }

                // Early Adopter - participated in Epoch 2 or 3 (Aug/Nov 2025)
                if (epochNames.has('Epoch 2') || epochNames.has('Epoch 3')) {
                    badges.push({ icon: '🏆', label: 'Early Adopter', type: 'legacy', title: 'Participated before PoWBoT' });
                }

                // Beta Tester - participated in Epoch 4 Testing
                if (epochNames.has('Epoch 4 Testing')) {
                    badges.push({ icon: '🧪', label: 'Beta Tester', type: 'activity', title: 'Helped test PoWBoT' });
                }

                // Multi-Epoch Veteran - active across many epochs (purple - consistency)
                if (historicalEpochs >= 3 || (historicalEpochs > 0 && epoch4Posts.length > 0 && epoch5Posts.length > 0)) {
                    badges.push({ icon: '🔄', label: 'Multi-Epoch Veteran', type: 'consistency', title: 'Active across 3+ epochs' });
                }
            }

            // Excellence - ranking based on Epoch 4 data
            if (allStats.epoch4 && allStats.epoch4.top_projects) {
                const ranking = allStats.epoch4.top_projects.findIndex(p => p.name === statsName);

                if (ranking === 0) {
                    badges.push({ icon: '🥇', label: 'Top Performer', type: 'excellence', title: '#1 in Epoch 4' });
                } else if (ranking === 1) {
                    badges.push({ icon: '🥈', label: '2nd Place', type: 'excellence', title: '#2 in Epoch 4' });
                } else if (ranking === 2) {
                    badges.push({ icon: '🥉', label: '3rd Place', type: 'excellence', title: '#3 in Epoch 4' });
                } else if (ranking >= 0 && ranking < 10) {
                    badges.push({ icon: '🏅', label: 'Top 10', type: 'excellence', title: `#${ranking + 1} in Epoch 4` });
                }
            }

            return badges;
        }

        function showBadgeTooltip(badgeElement) {
            const tooltip = badgeElement.querySelector('.badge-tooltip');
            if (!tooltip) return;

            // Hide any other visible tooltips
            document.querySelectorAll('.badge-tooltip.show').forEach(t => {
                if (t !== tooltip) t.classList.remove('show');
            });

            // Show this tooltip
            tooltip.classList.add('show');

            // Hide after 3 seconds
            setTimeout(() => {
                tooltip.classList.remove('show');
            }, 3000);
        }

        function getPlatform(url) {
            if (!url) return { name: 'Nostr', icon: '🟣' };
            const lower = url.toLowerCase();
            if (lower.includes('twitter.com') || lower.includes('x.com')) return { name: 'X', icon: '𝕏' };
            return { name: 'Nostr', icon: '🟣' };
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const day = date.getDate();
            const month = date.toLocaleDateString('en-US', { month: 'short' });
            const year = date.getFullYear();
            return `${day} ${month} ${year}`;
        }

        function flipSupportCard() {
            const card = document.getElementById('support-card');
            const isFlipped = card.classList.contains('flipped');

            // Toggle the flip
            card.classList.toggle('flipped');

            // Update height to match the now-visible side
            const inner = card.querySelector('.support-card-inner');
            const front = card.querySelector('.support-front');
            const back = card.querySelector('.support-back');

            // Set height based on which side will be visible
            const newHeight = isFlipped ? front.scrollHeight : back.scrollHeight;
            inner.style.height = newHeight + 'px';
        }

        function toggleEpoch5Posts(button) {
            const count = parseInt(button.dataset.count);
            const isExpanded = button.classList.contains('expanded');
            const container = document.getElementById('posts-list-epoch5');

            if (isExpanded) {
                // Collapse - hide posts after 5th
                container.querySelectorAll('.post-item').forEach((el, index) => {
                    if (index >= 5) el.classList.add('post-hidden');
                });
                button.textContent = `Show ${count} more`;
                button.classList.remove('expanded');
            } else {
                // Expand - show all posts
                container.querySelectorAll('.post-hidden').forEach(el => {
                    el.classList.remove('post-hidden');
                });
                button.textContent = 'Show less';
                button.classList.add('expanded');
            }
        }

        function copyAddressWithFeedback(address, elementId) {
            const addressElement = document.getElementById(elementId);
            const originalText = addressElement.textContent;

            navigator.clipboard.writeText(address).then(() => {
                // Add copied class for visual feedback
                addressElement.classList.add('copied');
                addressElement.textContent = 'Copied to clipboard!';

                // Reset after 2 seconds
                setTimeout(() => {
                    addressElement.classList.remove('copied');
                    addressElement.textContent = originalText;
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
                alert('Failed to copy address');
            });
        }

        function copyToClipboard(text, label) {
            navigator.clipboard.writeText(text).then(() => {
                alert(`${label} copied!\n\n${text}`);
            });
        }
